body:
  text: 欽定四庫全書論語解卷九宋張栻撰陽貨篇陽貨欲見孔子孔子不見歸孔子豚孔子時其亡也而往拜之遇諸塗謂孔子曰來予與爾言曰懷其寶而迷其邦可謂仁乎曰不可好從事而亟失時可謂知乎曰不可日月逝矣歲不我與孔子曰諾吾將仕矣陽貨欲夫子之見已以夫子之不往也則歸豚焉欲夫子之來拜也在禮當往拜則烏得而不往時其亡者則不欲見之也遇諸塗則有不得避焉貨三問而應之如響者貨蓋不可與言者故申不已之意而遜辭以答之然懷寶而迷邦誠不可謂之仁好從事而亟失時誠不可謂之知夫子誠未嘗不欲仕者特非其道則不可耳是則言雖遜而理亦未嘗枉也此待惡人之道若他人遜言則或至於害理直理則或傷於辭危聖人從容酬酢其含蓄中節如此子曰性相近也習相遠也原性之理無有不善人物所同也論性之存乎氣質則人禀天地之精五行之秀固與禽獸草木異然就人之中不無清濁厚薄之不同而實亦未嘗不相近也不相近則不得為人之類矣而人賢不肖之相去或相倍蓰或相什伯或相千萬者則因其清濁厚薄之不同習於不善而日遠耳習者積習而致也善學者克其氣質之偏以復其天性之本而其近者亦可得而一矣子曰惟上知與下愚不移上知則不淪於下下愚則不達於上苟非上知下愚則念不念之分固可得而移也上知下愚一存於氣禀乎曰不然上知固生知之流然亦學而可至也均是人也雖氣禀之濁亦豈有不可變者乎惟其自暴自棄而不知學則為安於下愚而不可移矣子之武城聞弦歌之聲夫子莞爾而笑曰割雞焉用牛刀子游對曰昔者偃也聞諸夫子曰君子學道則愛人小人學道則易使也子曰二三子偃之言是也前言戲之耳莞爾而笑者聞弦歌而喜也割雞焉用牛刀者謂其治小以大也君子學道則有以飬其仁心故愛人小人學道則亦和順以服事其上故易使夫子聞子游之語恐學者疑於前言以國小民寡為可忽也故告二三子以子游之言為是而謂前言為戲之辭氣抑揚之間豈弟和平無非教也公山弗擾以費畔召子欲往子路不說曰末之也已何必公山氏之之也子曰夫召我者而豈徒哉如有用我者吾其爲東周乎公山弗擾之召夫子謂其不徒然者以其肯召聖人恐有悔過自新之意也自周之東君臣上下之分日以陵夷故諸侯逼天子大夫制諸侯而陪臣畔大夫此東周之為也如使聖人得用必以正名為先固將反東周之為而復西周之舊則夫公山弗擾其得為今日之事乎子路之不說懼其汙也不知使聖人而誠可往則其撥亂反正固有道矣或曰公山弗擾執季氏以畔安知其志不在於克亂以權耶其能强公室殆未可知也其為東周亦未可知也夫弗擾不禀命於公而輙畔其大夫逆也欲以是而克亂是謂以亂易亂而反加甚焉後世亂臣賊子所以借虚名而為篡奪之計者也若夫子意其如是而欲往則是聖人可陷而可罔也其説失之矣子張問仁於孔子孔子曰能行五者於天下為仁矣請問之曰恭寛信敏惠恭則不侮寛則得衆信則民任焉敏則有功惠則足以使人能行此五者於天下則其心公平而周徧可知矣然恭其本與佛肸召子欲往子路曰昔者由也聞諸夫子曰親於其身為不善者君子不入也佛肸以中牟畔子之往也如之何子曰然有是言也不曰堅乎磨而不磷不曰白乎湼而不緇吾豈匏瓜也哉焉能繫而不食親於其身為不善者君子不入此君子守身之常法也至於磨不磷湼不緇在聖人然後可以言此盖堅之至則磨而不磷矣白之至則湼而不緇矣故楊氏曰堅白不足而欲自試於磨湼其不磷緇者幾希矣然而公山弗擾與佛肸之召夫子皆嘗欲往而卒不往何也其欲往者以天下無不可變之人無不可為之事而卒不往者則知其人之終不可變而事之終不可為耳一則生物之仁一則知人之智也子路蓋不悦乎弗擾之召矣及佛肸之召而復有言焉則以夫中心所疑雖聞聖人之言而自反終未安故問辨之不敢釋抑可謂善學矣然而子路之不悦在子路之分則當然盖子路以己處聖人而未能以聖人觀聖人耳子曰由也女聞六言六蔽矣乎對曰未也居吾語女好仁不好學其蔽也愚好知不好學其蔽也蕩好信不好學其蔽也賊好直不好學其蔽也絞好勇不好學其蔽也亂好剛不好學其蔽也狂學所以明善也不知學則徒慕其名而莫知善之所以為善也好仁不好學之蔽如欲力行自守以為仁而不知學以明之則其所行所守未免於私意適足以為愚而已至於好知不好學則用其聰明而不知約之所在故其蔽蕩好信不好學則守其小諒而不知義之所存故其蔽賊好直不好學則務徑情而不知含蓄故其蔽絞絞者訐而已好勇不好學則犯難而不知止故其蔽亂好剛不好學則務勝而不知反故其蔽狂是六者本為達徳善行而不好學則非所以為徳行而反以自蔽學如行大道日闢而通也不學如守暗室終窒而蔽矣子曰小子何莫學夫詩詩可以興可以觀可以羣可以怨邇之事父遠之事君多識於鳥獸草木之名興謂興己之善觀謂觀人之志和平而無邪故可以羣親切而不傷故可以怨温柔敦厚深篤乎人倫之際故邇可以事父逺可以事君而又可以多識鳥獸草木之名是則詩其可以不學乎張子曰止言事父事君舉其重者言之也子謂伯魚曰女為周南召南矣乎人而不為周南召南其猶正牆面而立也與為周南召南者謂躬行周南召南之實也天下之事未有不本於齊家必如周南召南所述室家之事而後為家齊由此而達之則無所不可行若為之不從此始則動有隔礙雖尺寸亦不可以推而行也故曰其猶正牆面而立也與然而未有不修身而家齊者故欲為周南召南者又以修身為先子曰禮云禮云玉帛云乎哉樂云樂云鐘鼓云乎哉玉帛固所以行禮也鐘鼓固所以為樂也謂玉帛鐘鼓為非禮樂則不可然禮樂豈止乎玉帛鐘鼓之間哉得其本則玉帛鐘鼓莫非吾情文之所寓不然特虚器而已所謂本者反諸吾身而求之則知其不逺也子曰色厲而内荏譬諸小人其猶穿窬之盜也與小人謂在下之小人言君子而色厲内荏則其為欺與小人之為穿窬者無以異也尹氏曰色剛厲而内柔荏其欲人之不知也推其心何異穿窬之盜哉子曰郷原徳之賊也孟子答萬章之問詳之矣惟其居之似忠信行之似廉潔衆皆説之自以為是而不可以入堯舜之道故為賊夫徳也子曰道聽而塗説徳之棄也聞善者存而體之則其徳蓄聚若徒以資談説而已則於徳何有哉是棄之也子曰鄙夫可與事君也與哉其未得之也患得之既得之患失之苟患失之無所不至矣患得患失者以得失為事也其所為患得者乃計利自便之心惟其有是心故既得則患失矣其患失之心乃患得之心也未得則患得既得則患失矣若是則凡可以勿失者皆在所必為而亦何所不至哉自古亂臣賊子其初亦豈敢遽有篡弑之萌惟其患失之心蹉跌至此故夫未得則患得既得則患失患失則無所不至履霜堅冰馴致其道也然則計利自便之萌是乃弑父與君之原也聖人謂為鄙夫者盖區區惟己私之徇不亦鄙乎子曰古者民有三疾今也或是之亡也古之狂也肆今之狂也蕩古之矜也廉今之矜也忿戾古之愚也直今之愚也詐而已矣疾生乎氣禀之偏狂而肆者過於進為也矜而廉者廉隅露見也愚而直者直情徑行也此雖偏而為疾然猶為疾之常至於狂而放則流而為蕩矜而争則溢而為忿戾愚而衒直則變而為詐是盖世衰俗敝則習益逺故也言疾則固為偏而今也併與古之疾而亡之則益甚矣古者三疾學則可瘳也至於今之疾悖理亂常之甚盖難反矣然困而能學亦聖人之所不棄也子曰巧言令色鮮矣仁解己見前子曰惡紫之奪朱也惡鄭聲之亂雅樂也惡利口之覆邦家者以其似是而非有以惑人之觀聴是以聖人惡之利口所以覆邦家者盖變亂事實使是非邪正率皆紊亂邦家所由傾覆也子曰予欲無言子貢曰子如不言則小子何述焉子曰天何言哉四時行焉百物生焉天何言哉言本以明理也聖人恐學者但求於言而反以支離也故有予欲無言之歎子貢從而問焉亦可謂達矣所謂四時行百物生者天道之流行無息也天雖不言而何隐哉聖人亦何隐哉動静語黙之間無非至理之所在也再曰天何言哉所以𤼵之者也孺悲欲見孔子孔子辭以疾將命者出户取瑟而歌使之聞之孺悲之不見疑在棄絶之域矣取瑟而歌使將命者聞是亦教誨之而終不棄也聖人之仁天地生物之心與宰我問三年之䘮期已久矣君子三年不為禮禮必壞三年不為樂樂必崩舊穀既没新穀既升鑽燧改火期可已矣子曰食夫稻衣夫錦於女安乎曰安女安則為之夫君子之居䘮食㫖不甘聞樂不樂居處不安故不為也今女安則為之宰我出子曰予之不仁也子生三年然後免於父母之懐夫三年之䘮天下之通䘮也予也有三年之愛於其父母乎人子之致哀於其親盖其心之不可以己者先王制禮為之過不及之節而㫁之以三年是謂天之則也宰我論䘮禮而欲止乎期孔子反復告之以女安則為之夫其食㫖不甘聞樂不樂居處不安果何哉以其有所不忍於心故也宰我聞夫子斯言而出其必有以忍於中矣子曰飽食終日無所用心難矣哉不有博奕者乎為之猶賢乎已飽食而無所用心則放越而莫知其極凡惡之所由生也博奕雖不足道然方其為之意專乎此比之放越而莫知其極者猶為愈焉此章大抵言無所用心則長惡為可畏耳子路曰君子尚勇乎子曰君子義以為上君子有勇而無義為亂小人有勇而無義為盜君子尚義不尚勇盖尚勇則徒知勇之務而或至於犯義者有之尚義則義之所當為勇固在其中矣亂謂亂常理也盜謂盜其上也君子小人以在上在下者為稱子貢曰君子亦有惡乎子曰有惡惡稱人之惡者惡居下流而訕上者惡勇而無禮者惡果敢而窒者曰賜也亦有惡乎惡徼以為知者惡不孫以為勇者惡訐以為直者君子者惟其愛人故惡稱人之惡者為其薄也惟其順徳故惡居下流而訕上者為其逆也惟其循理故惡勇而無禮者為其陵犯也惟其達義故惡果敢而窒者為其冥行一本作妄動也此惡不善之公心亦天下之通義也子貢之惡惡其近似而害於知勇與直者也子貢惡乎此則所以檢身者抑可知矣徼孔注云抄也抄人之意以為己有子曰惟女子與小人為難養也近之則不孫遠之則怨女子隂質小人隂類其所望於人者常深故難飬知其難飬如此則當思所以待之之道其惟和而有制與夫不惡而嚴乎子曰年四十而見惡焉其終也已見惡者有不善而見惡於人也此又甚於無聞者方其壮時猶不能用力以矯厲則終於淪棄可知矣此警懼學者使之激昂自進於早也微子篇微子去之箕子為之奴比干諫而死孔子曰殷有三仁焉三人者皆當其時於其身處之盡其道者也其立紂之朝所以維持宗社之心至矣而有不得已焉則自靖以獻於先王詳味微子一篇則可見三子之所為深切至到者矣孔子皆稱為仁以其不失夫性之理故也一作以其中誠惻怛克盡其道故也桞下惠為士師三黜人曰子未可以去乎曰直道而事人焉往而不三黜枉道而事人何必去父母之邦桞下惠仕則仕黜則黜而未嘗枉其道也若枉道則害於和之理矣至於孔子道不行然父母之邦可以去而亦去雖周行天下而未嘗苟仕也則與下惠異矣下惠謂焉往而不三黜則所以期於斯世者亦幾於不恭矣此篇記桞下惠於三仁之後以明其趨之一下文又詳著孔子之事以見聖人之為至焉如楚狂耦耕荷蓧之徒則陷於一偏而不足以知聖人者夷齊而下雖各得其道而未盡其至者故終之以孔子之無可無不可盖於是無以加矣此孟子集大成之意也齊景公待孔子曰若季氏則吾不能以季孟之間待之曰吾老矣不能用也孔子行景公計量所以待之輕重是與孔子事道之意違矣程子曰季氏强臣君待之之禮極隆然非所以待孔子季孟之間則待之之禮為至矣然曰吾老矣不能用也此不係待之之輕重特以不用而去齊人歸女樂季桓子受之三日不朝孔子行去讒逺色賤貨而貴徳所以勸賢也今好色而忘敬賢之心則道之不行可見矣是以去之楚狂接輿歌而過孔子曰鳳兮鳳兮何徳之衰往者不可諫來者猶可追己而已而今之從政者殆而孔子下欲與之言趨而辟之不得與之言接輿之意盖欲夫子隐居以避世耳觀其知鳳徳之衰且辭氣舒而不迫其人天資亦髙矣夫子意其可以告語欲與之言其趨而辟盖匿其聲迹而已於是見其隘矣長沮桀溺耦而耕孔子過之使子路問津焉長沮曰夫執輿者為誰子路曰為孔丘曰是魯孔丘與曰是也曰是知津矣問於桀溺桀溺曰子為誰曰為仲由曰是魯孔丘之徒與對曰然曰滔滔者天下皆是也而誰以易之且而與其從辟人之士也豈若從辟世之士哉耰而不輟子路行以告夫子憮然曰鳥獸不可與同羣吾非斯人之徒與而誰與天下有道丘不與易也夫子使子路問津亦察其容止之有異也長沮謂是知津矣此譏夫子周行天下之已久也桀溺之意則以為當世滔滔一律誰肯以夫子之道易己所為言其徒勞耳故以夫子為辟人之士謂其道不合而後去也以己為辟世之士謂舉世不得而親之也夫子憮然者以其與吾意異也夫人不可與鳥獸同羣當與斯人為徒耳以天下之無道也故欲從而變易之使天下而有道則何事於變易乎必如桀溺之意以其無道而辟之則将去人之類與鳥獸同羣而後為可耳子路從而後遇丈人以杖荷蓧子路問曰子見夫子乎丈人曰四體不勤五穀不分孰為夫子植其杖而芸子路拱而立止子路宿殺雞為黍而食之見其二子焉明日子路行以告子曰隱者也使子路反見之至則行矣子路曰不仕無義長幼之節不可廢也君臣之義如之何其廢之欲潔其身而亂大倫君子之仕也行其義也道之不行已知之矣四體不勤五穀不分孰為夫子其意以為吾知勤四體分五穀之為道耳植杖而芸亦不迫矣子路聴其辭氣見其容止而敬之拱而立未知所言也止子路宿殺雞為黍以食而復見其二子則其為人盖有餘裕而疑非遂絶世者也故夫子以為隐者而使子路反見之欲有以告語之也至則行矣則惟恐人之已知故行以避焉其隘可知也子路所云殆述夫子之意云爾義者宜也故宜莫大於君臣故以不仕為無義丈人之見二子長幼之節不可得而廢者也其不可得而廢者非以其性之所有乎長幼之節既不可廢則夫君臣之義又烏得而廢之乎彼盖欲潔其身而不知亂倫之害於人道為大也君子之仕豈為他哉行吾義而已道之不行君子豈不知乎而汲汲於斯世者固有不可以己者也此篇所載楚狂耦耕荷蓧此四人皆素隐者然就其中荷蓧其差髙乎逸民伯夷叔齊虞仲夷逸朱張桞下惠少連子曰不降其志不辱其身伯夷叔齊與謂桞下惠少連降志辱身矣言中倫行中慮其斯而已矣謂虞仲夷逸隱居放言身中清廢中權我則異於是無可無不可七人者皆為逸民而制行則異亦有淺深之不同也不降其志不辱其身其清之至與下惠少連雖立於惡人之朝未免乎降志辱身然道則未嘗枉也故言不失於倫理而行不違其慮思此所謂由由然與之偕而不自失者也至於虞仲夷逸則又其次也放言謂其言放而不拘也異乎中倫者矣然而其持身亦合於清者之所為而其退而廢也亦非素隐行怪之為有合於權為可取也若夫孔子之無可無不可則異乎七子者之撰矣無可者不以可為主也無不可者不以不可為主也其曰無者言其不存於中也然則夫子之心果何如哉當可則可當不可則不可大而化之其惟天乎若夷齊之心則未免有不可若下惠少連則未免有可也故孟子乃所願則學孔子而已大師摯適齊亞飯干適楚三飯繚適蔡四飯缺適秦鼓方叔入于河播鼗武入于漢少師陽擊磬襄入于海張子曰始者樂失其次夫子自衛反魯一嘗治之其後伶人賤工識樂之正及魯益衰三家僭妄自大師以下皆知散之四方踰河蹈海以去亂聖人俄頃之助功化已如此其曰用我者期月而已可也豈虚言哉周公謂魯公曰君子不施其親不使大臣怨乎不以故舊無大故則不棄也無求備於一人此四言者反復而言之皆當在所篤也篤乎此則君國子民之本立矣不施其親尹氏曰親者不失其為親是以無所施此説為安大臣既用之則當聴其言而使得行其道其可使怨不吾以乎故舊無大故則不棄絶之大故必得罪於國與民者也然曰不棄而已非私以爵祿也無求備於一人於一夫之身而求備非特失用才之道而亦非所以飬徳也周有八士伯達伯适仲突仲忽叔夜叔夏季隨季騧張子曰周有八士記善人之富也楊曰八人盡為士之道故謂之八士論語解卷九
