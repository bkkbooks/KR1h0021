body:
  text: 欽定四庫全書經部八論語解目録四書類卷一學而篇為政篇卷二八佾篇里仁篇卷三公冶篇雍也篇卷四述而篇泰伯篇卷五子罕篇鄉黨篇卷六先進篇顔淵篇卷七子路篇憲問篇卷八衛靈公篇季氏篇卷九陽貨篇微子篇卷十子張篇堯曰篇欽定四庫全書癸巳論語解提要臣等謹案癸巳論語解十卷宋張栻撰其書成於乾道九年是年嵗在癸巳故名曰癸巳論語解考朱子大全集中備載與栻商訂此書之語抉摘瑕疵多至一百一十八條又訂其誤字二條以今所行本校之從朱子改正者僅二十三條餘則悉仍舊稿似乎齗齗不合然父在觀其志一章朱子謂舊有兩説當從前説為順反覆辨論至於二百餘言而後作論語集注乃竟用何晏集解所引孔安國義仍與栻説相同蓋講學之家于一字一句之異同務必極言辨難斷不肯附和依違中間筆舌相攻或不免于激而求勝逮學問漸粹意氣漸平乃是是非非坦然共白不復回護其前説此造詣之淺深月異而嵗不同者也然則此一百一十八條者特一時各抒所見共相商𣙜之言未可以是為栻病且二十三條之外栻不復改朱子亦不復爭當必有渙然氷釋始異而終同者更不必執文集舊稿以朱子之説相難矣乾隆四十一年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書論語解卷一宋張栻撰學而篇子曰學而時習之不亦説乎有朋自逺方來不亦樂乎人不知而不愠不亦君子乎學貴於時習程子曰時復紬繹浹洽於中也言學者之於義理當時紬繹其端緒而涵泳之也浹洽於中故説説者油然內慊也有朋自逺方來則己之善得以及人而人之善有以資已講習相滋其樂孰尚焉樂比於説為發舒也雖然朋來固可樂而人不知亦不愠也蓋為仁在已豈與乎人之知與不知乎門人記此首章不如是則非所以為君子也有子曰其為人也孝弟而好犯上者鮮矣不好犯上而好作亂者未之有也君子務本本立而道生孝弟也者其為仁之本與其為人也孝弟與孟子所言其為人也寡欲其為人也多欲立語同蓋言人之資質有孝弟者孝弟之人和順慈良自然鮮好犯上不好犯上況有悖理亂常之事乎君子務本言君子之進德每務其本本立則其道生而不窮孝弟乃為仁之本蓋仁者無不愛也而莫先於事親從兄人能於此盡其心則夫仁民愛物皆由是而生焉故孝弟立則仁之道生未有本不立而末舉者也或以為由孝弟可以至於仁然則孝弟與仁為異體也失其旨矣子曰巧言令色鮮矣仁此所謂巧言令色欲以恱人之觀聽者其心如之何故為鮮矣仁若夫君子之修身謹於言辭容色之間乃所以體當在已之實事是求仁之要也曾子曰吾日三省吾身為人謀而不忠乎與朋友交而不信乎傳不習乎為人謀而有不忠處於己者不盡也與朋友交而不信施於彼者不實也傳而不習則無以有諸躬曾子以是三者自省焉可謂為已篤實之功矣子曰道千乘之國敬事而信節用而愛人使民以時道千乘之國猶言治千乘之國之道也敬事者事無大小一於敬也信者信於己也一作不欺之也節用者為之制度也愛人者無往而不存其愛也使民以時愛人者之先務也於是五者之中敬事而信又其本也蓋敬與信不立則無適而可耳以是五者為先王政之行斯有序而四逹矣嗟乎為治而不本於此則不得為善治蓋如木之有根水之有源有此而後三代之法度可得而興也子曰弟子入則孝出則弟謹而信泛愛衆而親仁行有餘力則以學文入孝出弟謹行信言泛愛親仁皆在已切要之務行有餘力則以學文非謂俟行此數事有餘力而後學文也言當以是數者為本以其餘力學文也若先以學文為心則非篤實為已者矣文謂文藝之事聖人之言貫徹上下此章雖言為弟為子之職始學者之事然充而極之為聖為賢蓋不外是也此數言先之以孝弟蓋孝弟人道之所先必以是為本推而逹之也子夏曰賢賢易色事父母能竭其力事君能致其身與朋友交言而有信雖曰未學吾必謂之學矣賢賢而敬見於色事父母竭其力之所至事君不敢有其身交朋友而言有信是人也可謂忠信篤實者矣雖使其未學而其所行固學之事也子夏之意非謂能如是則不待夫學也蓋以所貴乎學者在此而不在彼欲使學者務其本也此章首言賢賢易色夫能親賢則固學之先務也不曰不學而曰未學辭蓋涵蓄矣子曰君子不重則不威學則不固主忠信無友不如已者過則勿憚改學以重為先重者視聽言動之際不敢以易也夫然故暴慢逺而德性尊其思必専其行必果其守必篤學之所以固也不然則無以持其外而非心易以入雖得之必失之主忠信主字有力蓋斯須而不忠信則思慮言行皆無所據依同於無物也主乎忠信則立於實地德所以進也無友不如已者取友之道不但取其如已者又當友其勝已者以友天下之士為未足又尚論古之人此取友之道也若友不如已者則足以惰志而害德矣過則勿憚改見過則改也人所以不能改過者以其憚之故勿憚則其改過也速矣夫重者嚴於外者也忠信者存乎中者也存乎中所以制其外嚴於外所以保其中也而資友以輔之改過以成之君子之學不越於是而已矣曾子曰慎終追逺民德歸厚矣慎非獨不忽之謂誠信以終之也追非獨不忘之謂久而篤之也凡事如是所以養德者厚矣人之視效而作興其有不趨於厚乎厚者德之所聚而惡之所由消靡也子禽問於子貢曰夫子至於是邦也必聞其政求之與抑與之與子貢曰夫子溫良恭儉讓以得之夫子之求之也其諸異乎人之求之與和順積中則英華發於外而況於聖人乎溫良恭儉讓聖人之德容見於接人之際者子貢亦可謂形容之至矣想當時之人望其儀形固已盎然恱服而況於聆其話言乎夫子之求之也其異乎人之求之與言在他人則求而得之在夫子則人自樂告不即人而人即之也雖然夫子至是邦必聞其政而未有能委國而授政於夫子者何與蓋見聖人之儀形而樂告之者秉彛好德之良心也而卒不能授以政者則以夫私欲害之之故也程子曰溫和厚也良易直也恭莊敬也儉節制也讓謙遜也子曰父在觀其志父沒觀其行三年無改於父之道可謂孝矣父在人子有不得行其志者志欲為之而有不得行焉則孝子之所以致其深憂者亦可得而推矣父沒觀其行者首於其居喪之際而觀之也三年無改於父之道志哀而不暇他問也或曰如其非道之甚則亦待三年乎蓋三年無改者言其常也可以改而可以未改者也若悖理亂常之事則孝子其敢須臾以寧不曰孝子成父之美不成父之惡乎曰父之道則固非悖理害常之事也一本云舊説謂父在能觀其志而承順之父沒觀其行而繼述之又能三年無改於父之道可謂孝矣此説文理為順三年無改於父之道尹氏謂孝子之心有所不忍也有子曰禮之用和為貴先王之道斯為美小大由之有所不行知和而和不以禮節之亦不可行也禮主乎敬而其用則和有敬而後有和和者樂之所生也禮樂必相須而成故禮以和為貴先王之道以此為美小大由之而無不可行也然而有所不行者以其知和之為貴務於和而已不能以禮節之則其弊也流故亦不可行也蓋為禮而不和與夫和而無節皆為偏弊也禮樂分而言之則為體為用相須而成合而言之則本一而已矣有子曰信近於義言可復也恭近於禮逺恥辱也因不失其親亦可宗也信謂言信恭謂貌恭復謂其言可踐也言而不可復則不可行將至於失其信矣或欲守其不可復之言則逆於理而反害於信矣恭而過於實則適足以為招恥辱之道而非所以為恭矣此皆徇於外而不近於禮義之故也故信近於義則其言可復也恭近於禮則逺於恥辱矣因恭信而不失親近於禮義則亦可宗尚矣蓋以其務實循本而非慕其名以事於外者也若夫安於禮義則此又不足以言之矣子曰君子食無求飽居無求安敏於事而慎於言就有道而正焉可謂好學也已於食與居而無求飽求安之意於事則敏所當行於言則慎所以出又孜孜焉就有道以求正則是人也物欲不行而惟理之是趨耳斯不謂之好學乎然必終之以就有道而正焉蓋世固有不徇物欲而勉於言行者然其所學毫釐之差則其所謂敏者有非所當敏而所謂慎者有非所當慎其弊有不可勝言者矣故必就夫有道而正然後為好學也正者言吾之偏也同世而親其人異世而求之書皆為就有道也子貢曰貧而無諂富而無驕何如子曰可也未若貧而樂富而好禮者也子貢曰詩云如切如磋如琢如磨其斯之謂與子曰賜也始可與言詩已矣告諸往而知來者貧而諂富而驕是為物欲所驅小人之為也貧而無諂富而無驕則免於惡矣然質美者或能之若夫樂與好禮則進於善道有日新之功其意味蓋無窮矣子貢知其為道學自修者之事故引切磋琢磨之詩以對謂有其質必學以成之也可謂告往而知來者矣如是而後可與言詩雖然安於無諂無驕而不知進學固未足貴而所謂無諂無驕者學者亦未可忽也居貧而有一毫求之之意處富而有一毫恃之之心皆諂與驕也此病未除而曰吾樂與好禮未之聞也必也無諂無驕而後樂與好禮可得而進焉又不可以不知也子曰不患人之不已知患不知人也有患人不已知之心則外馳而非為已者矣夫學本為何事而患人不已知乎而其患不知人者以夫取友之差用人之失正以在已之未明故爾蓋所當用力者也此篇列於魯論之首所記大抵皆欲學者略文華趨本實敦篤躬行循序而進乃聖人教人之大方從事於此則不差也其間所載道千乘之國亦是言為治之本務其本而後可以馴致成已成物一也學者冝深味此意不然貪髙慕逺而卒無實地可據豈不殆哉為政篇子曰為政以德譬如北辰居其所而衆星共之北辰謂之極者以其居中不遷而衆星所宗實其樞紐也德者所以為民極也詩曰豫懷眀德不大聲以色子曰聲色之於以化民末也故修已而百姓安篤恭而天下平自三代以後為治者皆出於智力之所為而無復此味矣子曰詩三百一言以蔽之曰思無邪詩三百篇美惡怨刺雖有不同而其言之發皆出於惻怛之公心而非有他也故思無邪一語可以蔽之學者學夫詩則有以識夫性情之正矣然學詩者非平心易氣反復涵泳之則亦莫能通其旨也子曰道之以政齊之以刑民免而無恥道之以德齊之以禮有耻且格德禮者治之本政刑非不用也然德立而禮行所謂政刑者蓋亦在德禮之中矣故其涵泳薰陶有以養民之心使知不善之為耻而至於善道若其本不立而專事於刑政之末則民有苟免之意而不知不善之為耻何以禁其非心乎後世之論治及於教者鮮矣子曰吾十有五而志于學三十而立四十而不惑五十而知天命六十而耳順七十而從心所欲不踰矩此章聖人身為之度使學者知聖可學而至而學不可以躐等也夫志學者其本也譬諸木之區萌水之一勺必有是本而不已焉曰志學者心存乎正而不他也聖人之所以為聖人者以其有始有卒常久日新而已必積十年而一進者成章而後逹也夫子固生知之聖而每以學知為言者明修道之教以示人也立者得於己而不失也不惑者理明義精無所疑也知天命者究極夫天之所為也耳順者入乎耳者無不通也從心所欲不踰矩者不勉不思而皆天則也孟懿子問孝子曰無違樊遲御子告之曰孟孫問孝於我我對曰無違樊遲曰何謂也子曰生事之以禮死葬之以禮祭之以禮無違謂無違於理也禮者理之所存也生事之以禮以敬養也死葬之以禮必誠必信也祭之以禮致敬而忠也親雖有存沒之間而孝子之心則一而已存是心而見於節文者無不順所謂以禮也以孟懿子之不能問也故因樊遲之御以告之使懿子因聖人之言而有發則夫三家之所以養其親與所以葬所以祭者皆違理之甚者也其敢斯須而安之乎孟武伯問孝子曰父母惟其疾之憂人子以父母之心為心舍有疾之外其他無以憂其親者則其一舉足一出言之不敢忘可知矣然而不幸而遇疾可也若所以衛養者不謹自取疾疢以貽親憂則亦為非孝而已子遊問孝子曰今之孝者是謂能養至於犬馬皆能有養不敬何以别乎事親以敬為本養而不知敬則但為養而已是何以别乎以敬為本則所以養者固亦在其敬之中矣子夏問孝子曰色難有事弟子服其勞有酒食先生饌曾是以為孝乎色難記所謂愈色婉容者是已蓋非愛敬之至和順充積則形於外者不能常然也意者子夏於事親之際猶或少此與遊夏聖門髙弟其於致養服勤蓋所優為故一則告之以敬一則告之以色難皆勉其所未盡而所以進之者逺矣子曰吾與回言終日不違如愚退而省其私亦足以發回也不愚不違如愚者心濳默識非言語之可形也一作潛心默識無疑之可復也退而察其私則亦足以發明斯道是夫子之所言者顔子體之於日用之中而無間也此其請事斯語之效歟善學者以身履之為貴聖人之觀人亦考其實有諸已者何如耳子曰視其所以觀其所由察其所安人焉廋哉人焉廋哉所以謂其所為也即其所為者而視之其事善矣則當觀其所從由之道果為善乎為利乎人固有同為一事而所發有善利之分者矣其所由者是則又當察其所安者焉所安謂心之所主人固有一事所發之善而平日之所存未必在是者矣觀詳於視而察深於觀觀人之法亦盡於此矣然而在已者未明則亦何以察人乎若在已則當於存主處用功所安者正道則所由者不差而其失鮮矣子曰溫故而知新可以為師矣溫故存其所已能者也知新進其所未及者也此雖兩義而實相通惟能溫故是以知新也可以為師者言其溫故知新為可師也程子曰如此處極要理會若只認溫故知新可以為人師則氣象窄狹矣學者推此一端庶幾可以味聖賢之辭意矣子曰君子不器器者拘於一物凡人可以器言者皆以其才而論之也器雖有小大然其為拘於才而有限則一也若君子則進於德進於德則氣質變化而才有弗器者矣子貢問君子子曰先行其言而後從之君子主於行而非以言為先也故其言之所發乃其力行所至言隨之也夫主於行而後言者為君子則夫易於言而行不踐者是小人之歸矣子貢非不能踐言者然未免於多言夫子恐其有時而或以言為主而行有未精也是以深警焉夫未之能踐而言與夫力行所至而言者其意味有間矣學者宜深察之子曰君子周而不比小人比而不周君子小人之分公私之間而已周則不比比則不周天理人欲不並立也君子內恕以及人其於親疏逺近賢愚處之無不得其分蓋其心無不溥焉所謂周也若小人則有所偏係而失其正其所親昵皆私情耳所謂比也子曰學而不思則罔思而不學則殆學者學乎其事也自灑掃應對進退而往無非學也然徒學而不能思則無所發眀罔然而已思者研窮其理之所以然也然徒思而不務學則無可據之地危殆不安矣二者不可不兩進也學而思則德益崇思而學則業益廣蓋其所學乃其思之所形而其所思即其學之所存也用功若此內外進矣子曰攻乎異端斯害也已攻如攻木之攻雖小道必有可觀者焉致逺恐泥是以君子弗為即此意也一本作異端之説非無可喜惟其偏蔽一或攻之則害於心術而難反或解此章攻如攻伐之攻以為惡異端而力攻之適足以自敝夫將以正人心則異端之攻亦有不得而已者然君子貴於反經而已矣子曰由誨女知之乎知之為知之不知為不知是知也子路勇於進於知與不知之間容有察之未精者故夫子語之以知之之道蓋於其所能知與其所未知者皆能察其實而無自欺非心平氣和守約務實者莫之能也於此而博學審問慎思明辨則其不知者亦終將知之矣故曰是知也言是乃知之道也不然強以不知為知是則終身不知而已子張學干祿子曰多聞闕疑慎言其餘則寡尤多見闕殆慎行其餘則寡悔言寡尤行寡悔祿在其中矣子張之學干祿豈若世之人慕夫寵利者哉亦曰士而祿仕其常理耳夫子獨告之以得祿之道謂在我者謹於言行而寡夫尤悔則固得祿之道夫謹言行者非期於得祿也亦非必得祿也曰祿在其中矣辭氣不迫而義則完矣若告之以士不可以求祿則理有所未盡而亦非長善救失之方也子張於道少深潛縝密之功或以為難能而未仁或以為堂堂而難與並為仁蓋可見也故夫子告之以闕疑闕殆又曰慎言其餘慎行其餘若是其謹矣而猶於尤悔曰寡焉則所以約之者深矣哀公問曰何為則民服孔子對曰舉直錯諸枉則民服舉枉錯諸直則民不服哀公之時強臣擅命民幾不知有公室矣患民之不服而問焉亦有激而然也夫子之告之者雖為哀公而言其實先王所以得民心者不越是也蓋善善而惡惡乃兆民之彛性在上者舉錯得宜則莫不盎然而誠服蓋有以順其彝故也不然則將憪然而不服以咈其性故耳使哀公而眀此義則君子聚於朝人心一於下何畏乎強臣而何患公室之不競哉雖然在上者焉知枉直而舉錯之亦曰公其心而已矣季康子問使民敬忠以勸如之何子曰臨之以莊則敬孝慈則忠舉善而教不能則勸古之治天下者修之吾身而已耳夫臨民以莊孝於親慈於下善者舉之不能者教之此皆在我所當為非為欲使民敬忠以勸而為之也然臨之以莊而民敬心生孝慈而民忠於已舉善教不能而民感恱以勸其應蓋有不期然而然者則修之吾身豈不至約乎季康子不知自反而望於民者深而有是問夫子以正理告之耳或謂孔子曰子奚不為政子曰書云孝乎惟孝友于兄弟施於有政是亦為政奚其為為政惟孝友于兄弟孝於親則必友于兄弟也孝友篤於家則其施於有政亦是心而已然則雖不為政而在家庭之間躬行孝友之行為政之道固在是矣何待夫為政哉蓋或者勉夫子以為政之事而夫子告之以為政之道也子曰人而無信不知其可也大車無輗小車無軏其何以行之哉車無輗軏則無以行人而無信則亦不可行也信者以實之謂言以實則其言為有據行以實則其行為可常不然則無所憑依妄而已矣此與雖州里行乎哉之行同意夫學者信以為本則德可進業可廣若不務信其言行而徒慕髙逺終不可行而已矣子張問十世可知也子曰殷因於夏禮所損益可知也周因於殷禮所損益可知也其或繼周者雖百世可知也三王之禮各因前世而損益之蓋曰隨時循理而已以殷周已驗之迹而推之則夫百王繼承損益之常道蓋可得而知矣若夫自嬴秦氏廢先王之典而一出於私意之所為有王者作其於繼承之際非損益之可言直當盡變革之然其所為變革者亦不過因其時而損益三代之禮云耳故曰王天下有三重焉其寡過矣乎此亦雖百世可知也一本云三王之禮各因前世而損益之其所因者五典五禮之大綱也其損益者見於節目文質之隨時也以殷周已驗之迹而推之則夫百王繼承損益之常道蓋不可得而易此矣後有作者欲法先王之善治則先立大綱而所謂損益者隨時以制其宜焉則亦何逺之有謂之百世可知者不亦信乎子曰非其鬼而祭之諂也見義不為無勇也祀典自天子至於庶人祭各有其分不可紊也蓋有是理則有是鬼神故於所當祭而祭則其鬼享若無是理則亦無是鬼神也而祭何為哉是徒為諂而已見其義之不安則當速止耳而不能止者狃於習俗故也雖然是特其見義之未明耳使其了然於鬼神之情狀則其於義之所在有為之而莫禦者矣論語解卷一欽定四庫全書論語解卷二宋張栻撰八佾篇孔子謂季氏八佾舞於庭是可忍也孰不可忍也季氏以陪臣而僣天子之舞目睹其數而安焉於是而忍為則亦何往而不忍也亂臣賊子之萌皆由於忍而已忍則安之矣三家者以雍徹子曰相維辟公天子穆穆奚取於三家之堂佾之用八著見於目者也雍之詩天子與相之言著聞於耳者也是二者皆不待究其義而可知猶且安焉則凡僭亂之事何所不可為也程子曰魯用天子禮樂成王之賜伯禽之受皆非也其因襲之弊遂使季氏僭八佾三家僭雍徹故仲尼於此著之子曰人而不仁如禮何人而不仁如樂何禮樂無乎不在而其理則著於人心人仁則禮樂之用興矣人而不仁其如禮樂何林放問禮之本子曰大哉問禮與其奢也寧儉喪與其易也寧戚禮者理也理必有其實而後有其文文者所以文其實也若文之過則反浮其實而害於理矣周之末世其弊蓋如此林放獨能以禮之本為問亦可謂得所問矣夫禮而失於奢寧過於儉也喪而易焉寧過於戚也蓋儉與戚其實則存奢則逺於實易則亡其實其文雖備無益也言禮而又言喪所以深示其本也子曰夷狄之有君不如諸夏之亡也夷狄雖政教所不加然亦必有君長以統蒞之然後可立也春秋之世禮樂征伐自諸侯出降而自大夫出又降而陪臣竊國命是以聖人傷歎以為夷狄且有君不如諸夏之無君也夫諸夏者禮義之所出也今焉若此其變亦憯矣此春秋之所為作季氏旅於泰山子謂冉有曰汝弗能救與對曰不能子曰嗚呼曾謂泰山不如林放乎林放猶能問禮之本泰山豈受非禮之祭乎蓋鬼神雖幽不外乎理人心猶所不安也謂神其聽之乎曰曾謂泰山不如林放乎辭氣不迫而鬼神之理亦可得而推矣或疑季氏雖天子之禮樂亦且僭之何有於諸侯而孔子欲救之意者當冉有為家臣之時初有旅泰山之事故夫子欲其救之以為之兆而冉有蓋不能也子曰君子無所爭必也射乎揖讓而升下而飲其爭也君子爭生於有已君子克己者也是以無所爭惟射疑於可爭而君子之於射於以正己而觀德耳揖讓而後升去位而舉爵其雍容辭遜自反而下人之意蓋如此然則其爭也君子乎於射而不爭則他可知矣子夏問曰巧笑倩兮美目盼兮素以為絢兮何謂也子曰繪事後素曰禮後乎子曰起豫者商也始可與言詩已矣凡禮之生生於質也無其質則禮安從施素雖待於絢然素所以有絢也無其質則何絢之有曰繪事後素者謂質為之先而文在後也子夏於此知禮之為後可謂能默會之於語言之外矣故夫子有起豫之言子夏在聖門文學之科而其所得蓋如此可謂知本矣子貢子夏或有所興起而得之於詩或誦詩而有以感發吾之至意皆善為詩者也子曰夏禮吾能言之把不足徴也殷禮吾能言之宋不足徴也文獻不足故也足則吾能徴之矣文謂典章獻謂故老之賢者杞宋在當時是二者皆有所不足故於稽考咨詢有闕焉則夫二代之禮聖人雖能言其意而度數節文之實蓋有不得而徴者矣無徴不信是以聖人或闕焉夫以聖人之生知而學至於前代制作之原固已默識而無餘矣然至於事為之著必考文獻於故國有所不足又從而闕之其問禮於老聃問官名於郯子及史之闕文皆是意也非惟至誠無息不自有其聖智而於制作之實文理密察又如此子曰禘自既灌而往者吾不欲觀之矣禘者天子之大祭祫者諸侯之大祭魯諸侯也而用天子之禮以祭位與時俱不稱則為無是鬼神矣灌者求神之始夫子謂自灌而往皆不欲觀蓋既無是鬼神則其節文雖多亦妄而已或以為於始祭之時精意不至則其餘不足觀此意雖美然聖人不他言祭祀而獨以禘為言以是知蓋為魯設程子之説精矣或問禘之説子曰不知也知其説者之於天下也其如示諸斯乎指其掌或問禘之説而對以不知者蓋聖人難於斥言之欲問者深思其故也夫禮者天之秩也禘之為禮惟天子得用之而諸侯不得用之者蓋天理之所當然也天下萬事皆有所當然者天之所為也苟知禘之説則於治天下之道如指諸掌之易明亦曰循其理而已矣祭如在祭神如神在子曰吾不與祭如不祭祭如在謂祭其先如在者如其生存也祭神如神在謂天子祭百神諸侯祭其境內山川之類也如神在者如其神靈之接也此皆誠之不可掩也吾不與祭如不祭者不誠則無物也夫所謂神者天地其神之至歟以至於天地之間運行變化者與夫山林川谷丘陵能出雲為風雨者是皆神也天子有天下則得兼祭之諸侯有一國則得祭其境之望而已有是鬼神則有是禮樂皆誠之所存也非明於天地之性者曷足以究鬼神之情狀哉王孫賈問曰與其媚於奧寧媚於竈何謂也子曰不然獲罪於天無所禱也奧者室神之主程子曰奧喻貴臣竈喻用事者此乃家人禱祠之言王孫賈舉以為問其意則欲夫子媚於已也夫子謂苟獲罪於天則媚奧媚竈皆何所益蓋胸中所存一有不直則為獲罪於天矣夫欲求媚是不直之甚者也斯言即禱祠而論之而所以答其意者亦無不盡矣子曰周監於二代郁郁乎文哉吾從周周監於夏商而制作郁郁乎文哉言其盛且備不可以有加也故聖人欲從周若使聖人居制作之位大體則從周然其間損益之冝如行夏時乘殷輅則有之矣子入太廟每事問或曰孰謂鄹人之子知禮乎入太廟每事問子聞之曰是禮也禮以敬為主宗廟之事嚴矣其大體聖人固無不知也至於有司之事則容亦有所不知者焉知與不知皆從而問敬其事也或以為不知禮聖人告之以是禮也所以明禮意之所存也子曰射不主皮為力不同科古之道也君子之射以觀德行習禮樂也豈為力哉不主皮言不以貫革為主也不以貫革為主則君子之所以為射者蓋可知矣為力不同科大程子曰言與為力而射者不同科也夫弧矢之利以威天下執弓矢而禦侮勞力者小人之事君子之射意不為此曰古之道言當時失此意也子貢欲去告朔之餼羊子曰賜也爾愛其羊我愛其禮魯自文公告朔之禮廢矣餼羊雖存子貢之意以為禮既廢矣餼羊何為徒為煩費而已夫子之意以為禮雖廢而羊存庶幾後之人猶有能因羊以求禮者是則羊雖虗器固禮之所寓也故曰爾愛其羊我愛其禮玩夫子之辭意則子貢之欲去羊其亦隘狹而少味矣子曰事君盡禮人以為諂也聖人斯言傷時人不知事君之禮也曰盡禮則非有所加也適當其冝而已觀鄉黨所載與夫拜下之從則可見也盡禮而人以為諂則時人之不知禮可知矣特曰人以為諂也聖人道大德𢎞故其言含蓄如此定公問君使臣臣事君如之何孔子對曰君使臣以禮臣事君以忠定公發此問蓋亦有所感發也聖人告之者乃君臣相與之常道雖帝王之世不越是矣使臣以禮如傳所謂敬大臣體羣臣之類是也事君以忠無以有已有犯而無隱也君使臣以禮臣事君以忠則上下交而泰治興矣然在人君端本之道以禮使臣則羣臣得盡其忠不然懼賢者之日逺而小人之日親也子曰關雎樂而不淫哀而不傷哀樂情之為也而其理具於性樂而至於淫哀而至於傷則是情之流而性之汨矣樂而不淫哀而不傷發不踰則性情之正也非養之有素者其能然乎關雎之詩樂得淑女以配君子至於鐘鼓樂之琴瑟友之所謂樂而不淫也哀窈窕思賢才至於寤寐思服展轉反側所謂哀而不傷也玩其辭義者可不深體於性情之際乎哀公問社於宰我宰我對曰夏后氏以松殷人以柏周人以栗曰使民戰栗子聞之曰成事不説遂事不諫既往不咎社各用其所宜之木而已非有所取義也哀公聞周人以栗之言遽曰使民戰栗蓋素有欲用刑威之心故因言發見也宰我於此所當正義以救其失而曾莫之告也無乃使之益安於其所趨乎故夫子重言以責之謂汝以為成事而不説乎以為遂事而不諫乎以為既往而不咎乎既非此三者奈何而不告也然而是三言者後世人臣往往借以為説則亦不可以不辨夫事既成而不可説則當引去而不當尸其位也君所專而不得諫在下位則可非為大臣與任事者設也既往固不可咎然亦有當推咎者所以使之革其舊而圖其新也子曰管仲之器小哉或曰管仲儉乎曰管氏有三歸官事不攝焉得儉然則管仲知禮乎曰邦君樹塞門管氏亦樹塞門邦君為兩君之好有反坫管氏亦有反坫管氏而知禮孰不知禮管氏急於功利而不知道義之趨大抵其器小也或者聞小器之言則疑以為儉聞其三歸具官則又疑其知禮蓋當時習俗尊慕霸者聞聖人之言而惑之也聖人因其所疑托事以告然所謂三歸具官塞門反坫固無非在器小之中也學者深濳聖人之意真知夫管仲之果為小也而後知曾西畏子路而不為管仲者矣或曰聖人常大管仲之功矣而小其器何也聖人之言抑揚髙下各有攸當功雖大亦何害其為器之小乎子語魯大師樂曰樂其可知也始作翕如也從之純如也皎如也繹如也以成周衰樂廢蓋雖其聲音亦失之矣聖人因其義而得其所以為聲音者而樂可正也故曰樂其可知也翕如始作而合也純如縱之純一而和也雖合而和然髙下清濁眀白而不相奪倫也故又曰皎如也至於繹如也以成則相繼而有餘也先王之樂其聲音之所為至者亦具此矣玩夫此則其制始終之序亦可得而尋矣儀封人請見曰君子之至於斯也吾未嘗不得見也從者見之出曰二三子何患於喪乎天下之無道也久矣天將以夫子為木鐸封人蓋必有見於聖人容色辭氣之間而發是言門人有取云耳言二三子何患於夫子之不得時與位乎天下無道之久天固將使夫子振斯文以覺方來也蓋封人知文之在兹是乃天意耳子謂韶盡美矣又盡善也謂武盡美矣未盡善也舜紹堯之緒從容揖遜而有天下武王翦紂之暴一戎衣而有天下雖聖人之心初無二致揖遜征伐時焉而已然征伐之事聖人豈所欲哉有所不得已焉耳蓋時異則事異事異則所為憂樂亦異故其見於樂之聲容者亦不容無不同者焉是則韶武之俱為盡美者聖人之心一也武之未得為盡善者時與事之不同也故成湯有豫有慙德之言蓋以為不幸所值之時如此有慙於舜禹之事也嗟乎是武王之心也子曰居上不寬為禮不敬臨喪不哀吾何以觀之哉居上之主於寬與禮之主於敬喪之主於哀同蓋不寬則失所以為長人之本其他雖有所為尚何觀乎為禮而不敬臨喪而不哀則繁文末節雖多亦何以觀也然寬非縱弛之謂總其大綱使人得以自效也里仁篇子曰里仁為美擇不處仁焉得知居以親仁為美而所自處其可不擇而處仁乎不知擇是不知也故孟子因擇術之論而曰夫仁天之尊爵也人之安宅也莫之禦而不仁是不知也子曰不仁者不可以久處約不可以長處樂君子之可以久處約可以長處樂安於理而已不仁者勉強而暫處則有之若差久焉則移於約樂而無所不至矣仁者安仁知者利仁安仁者其心純一不待勉強而無不在是也利仁者知仁之美擇而為之故曰利也上蔡謝氏曰安仁則一利仁則二安仁者非顔閔以上去聖人不逺者不知此味也子曰唯仁者能好人能惡人好善而惡惡者性也凡人之好惡每以己加焉而失其正惟仁者為能克己故能好人能惡人莫非天下之公理而已子曰苟志於仁矣無惡也志於仁則無不善蓋元者善之長存乎此何惡之有惟其有不存焉則流於不善矣子曰富與貴是人之所欲也不以其道得之不處也貧與賤是人之所惡也不以其道得之不去也有得富貴之道有得貧賤之道蓋正而獲伸者理之常此以其道而得富貴者也不正而詘者亦理之常此以其道而得貧賤者也然世蓋有反是而富貴貧賤者矣所謂不以其道也惟君子則審其在已不為欲惡所遷故枉道而可得富貴已則守其義而不處在已者正矣不幸而得貧賤已則安於命而不去此其所以無入而不自得也一本云富貴人之所欲貧賤人之所惡此人情所同然不以其道得處富貴則不處不以其道得去貧賤則不去豈君子欲惡之情有異於人哉於人之所欲而不處於人之所惡而不去蓋其欲惡有甚於富貴貧賤者惟道所在而已君子去仁惡乎成名君子之所以為君子者以其不已於仁也去仁則何自而成君子之名哉蓋仁者人之道而善之長未有舍是而可他求者也君子無終食之間違仁造次必於是顛沛必於是君子無終食之間違仁是心無時而不存也造次必於是顛沛必於是主一之功也子曰我未見好仁者惡不仁者好仁者無以尚之惡不仁者其為仁矣不使不仁者加乎其身有能一日用其力於仁矣乎我未見力不足者蓋有之矣我未之見也好仁非深造者不能故曰無以尚之其次則惡不仁惡不仁是亦為仁者也知惡不仁則知勉於仁矣不使不仁之事加見於其身蓋知惡而遏止之也曰有能一日用其力於仁矣乎我未見力不足者用力於仁無力不足之患人皆有是道也病不求耳豈患力不足哉又曰蓋有之矣我未之見也用力於仁者豈可謂天下無之乎特未之見耳所以待天下與勉學者之意反復抑揚可謂𢎞大而深切矣子曰人之過也各於其黨觀過斯知仁矣君子之過於厚過於愛雖曰過也然觀其過而其心之不逺者可知矣若小人之過則失於薄傷於忍夫所謂薄與忍者是豈人之情也哉而其失至此則其所陷溺者亦可知矣故曰觀過斯知仁矣子曰朝聞道夕死可矣人為萬物之靈其虗眀知覺之心可以通夫天地之理故惟人可以聞道人而聞道則是不虗為人也故曰夕死可矣然而所謂聞道者實然之理自得於心也非涵養體察之功精深切至則焉能然蓋異乎異端驚怪恍惚之論矣子曰士志於道而恥惡衣惡食者未足與議也學道者以務實反本為要恥惡衣惡食者其心何如哉外馳如此雖曰志於道豈足與議道乎子曰君子之於天下也無適也無莫也義之與比適莫兩端也適則有所必莫則無所主蓋不失之於此則失之於彼鮮不倚於一偏也夫義人之正路也倚於一偏則莫能遵於正路矣惟君子之心無適也而亦無莫也其於天下惟義之親而已蓋天下事事物物皆有義焉義者存於中而形於外者也無適無莫而義之與比猶孟子所謂勿忘勿助長而必有事焉者也孟子言學者之用功而此言君子之存心耳或曰異端無適無莫矣而不知義之比此其所以異於吾儒蓋失之矣夫異端之所以不知義者正以其有適有莫之故也蓋未有不墮於一偏者若果能無適無莫則所謂義者蓋森然自得於物則之中矣子曰君子懷德小人懷土君子懷刑小人懷惠君子小人趣向之異故所懷不同大抵公私之分而已懷德懷刑好善惡惡之公心也懷土懷惠苟安務得之私意也然則在上者當顯其為比之道德刑之明則君子懷之而天下莫不歸往矣不然區區求小人之比已而仁賢不歸心豈能致治哉子曰放於利而行多怨放依也放於利而行者凡事每求便利於己也怨由不得其欲而生彼雖每求便利而事亦豈能盡利於己哉不得其欲則怨矣其胸次擾擾無須臾以寧也若夫君子正己而已無所求利故無不足而奚怨之萌哉子曰能以禮讓為國乎何有不能以禮讓為國如禮何為國以禮其言不讓夫子所以哂季路然則能以禮讓固為國之本蓋和順輯睦之所由興也不能以禮讓則其為國也將如禮何謂禮雖在天下其將如之何哉是亦無以為國矣子曰不患無位患所以立不患莫己知求為可知也患所以立求為可知皆為己者之事也立者所以立其身也可知者實之在己者也若有患其位與人莫己知之心一毫之萌則為徇於外矣不患無位而患所以立不患莫已知而求為可知則君子為己之學蓋可知矣若曰使在己有可知之實則人將自知之則是亦患莫己知而已豈君子之心哉子曰參乎吾道一以貫之曾子曰唯子出門人問曰何謂也曽子曰夫子之道忠恕而已矣道無不該也而有隱顯本末內外之致焉程子所謂如百尺木自根本至毫末皆一貫也若隱顯本末內外之致泯然莫别則所謂一以貫之者亦何所施哉夫子之告曾子當其可也曾子蓋默識之矣故答門人之問獨舉忠恕為言可以見曾子自得之深也夫忠為體恕為用實有是體則實有是用用之周乎物是其體之流行發見而已體用一源故也此豈非一貫之妙歟聖人全乎此天之道也曽子所稱夫子忠恕是己賢者求盡乎此人之道也子思所稱忠恕是己子曰君子喻於義小人喻於利喻謂通逹其趣也蓋君子心存乎天下之公理小人則求以自便其私而已其所趣所行久且熟也能無喻乎喻則好篤而不可反矣此君子小人之分也子曰見賢思齊焉見不賢而內自省也蓋莫非為已而已子曰事父母幾諫見志不從又敬不違勞而不怨事親者心存乎其親聽於無聲視於無形其體之精矣故幾微所形必得於心諫於其未著為易反也見志不從又敬不違河東侯氏曰加誠敬而不違其幾諫之初心蓋積其誠意如此勞而不怨竭力而不弛也子曰父母在不逺遊遊必有方以親之心為心也子曰三年無改於父之道可謂孝矣解見上子曰父母之年不可不知也一則以喜一則以懼以年之盛衰察氣之強弱而喜懼存焉亦人子盡心於其親之一事也子曰古者言之不出恥躬之不逮也君子以行不逮言為恥故言不輕其出言之不出則其勉於躬行者力可知也夫子懼學者務於言而行有弗篤則趨於薄也故言古之學者蓋如此子曰以約失之者鮮矣凡人事事以節約存心則有近本之意雖未能皆中節而其失則鮮矣子曰君子欲訥於言而敏於行言則欲訥行則欲敏蓋篤實自修無一毫徇外之意也言欲訥者畏天命行欲敏者恭天職子曰德不孤必有鄰德立於己則天下之善斯歸之蓋不孤也如善言之集良朋之來皆所謂有鄰也至於天下歸仁是亦不孤而已矣子遊曰事君數斯辱矣朋友數斯疏矣數必有由而然事君而必君之信己與朋友交而必交情之固是皆為私意之所加而數之所由生也推此可見彼既厭而數不止能無辱與疏乎論語解卷二欽定四厙全書論語解卷三宋張栻撰公冶長萹子謂公冶長可妻也雖在縲紲之中非其罪也以其子妻之子謂南容邦有道不廢邦無道免於刑戮以其兄之子妻之陸音紲息列翻今本作絏門人記此以見聖人取人託子之道南容之行固髙於公冶長然公冶長雖在縲紲而非其罪則其人能謹於行可知其所遇特無妄之災耳已之子兄之子何以異其配也或以其材或以其時焉耳為避嫌之論者是以私意觀聖人者也子謂子賤君子哉若人魯無君子者斯焉取斯意者子賤資質成就君子人也夫子謂使魯無君子則子賤亦何所取法而若是乎此非特歎魯國之多賢蓋言美質係乎薰陶之效如此也子貢問曰賜也何如子曰女器也曰何器也曰瑚璉也子貢之問蓋欲因師言以省已之所未至也而夫子告之抑揚髙下所以長善而救其失者備矣謂之器則固適於用然未若不器之周也謂之瑚璉則以其美質可以薦之宗廟也然瑚璉雖貴終未免於可器耳賜也味聖人之言意即其所至而勉其所未至則亦何有窮極哉或曰雍也仁而不佞子曰焉用佞禦人以口給屢憎於人不知其仁焉用佞佞之所以焉用者以其禦人以口給屢憎於人因其有才辨而流入於不善也若不知其仁則焉用佞蓋在仁者則發而中節佞與不佞何足以言之哉子使漆雕開仕對曰吾斯之未能信子説夫子使漆雕開仕知其可以施於有政也而開自謂斯未能信蓋胸中一毫有未盡不可以自欺也其篤志近思之功為何如哉則其所至蓋未可量也故子説然則學者自謂能信者其未知用其力者歟子曰道不行乘桴浮於海從我者其由與子路聞之喜子曰由也好勇過我無所取材乘桴浮海歎道之不行也從我者其由與以子路之勇於為也然夫子豈輕去中國而勇往者哉子路聞之而喜則以為夫子之必往也故曰好勇過我無所取材程子謂材與裁通用夫聖人之勇不可過也而過焉是未知所裁度也先後之間辭氣抑揚而理亦無不盡矣孟武伯問子路仁乎子曰不知也又問子曰由也千乘之國可使治其賦也不知其仁也求也何如子曰求也千室之邑百乘之家可使為之宰也不知其仁也赤也何如子曰赤也束帶立於朝可使與賔客言也不知其仁也仁難言也而孟武伯遽問子路之仁若以為未仁則子路蓋進於此者若以為仁則仁之義通上下而言語其全雖聖人不敢居也故但告以不知也武伯可以深思自省矣武伯復有問而併及於求與赤則各舉其所能者告之夫可使治賦可使為宰可使與賔客言非是心之存者不能然也就此上觀其仁則可語仁之成名則難也故又曰不知其仁也學者反復玩味知仁之難言如是則致知力行終吾身焉可也子謂子貢曰女與回也孰愈對曰賜也何敢望回回也聞一以知十賜也聞一以知二子曰弗如也吾與女弗如也子貢問賜也何如欲因師言以自省也夫子謂女與回也孰愈使之反已而自省也當時師弟子間所以相與者蓋如此聞一知十聞其端而究其極也聞一知二告往而知來者夫聞一知十豈特顔子天資之絶人哉蓋學問涵養至此也子貢知其不敢望回是亦其逹也夫子因其自知從而勉之曰吾與女弗如也程子曰聖人豈有所不及者哉所以勉子貢進學也一本云夫子既然其言又稱之曰吾與女弗如也與其弗如也之言所以長其善而勉其所未及也宰豫晝寢子曰朽木不可雕也糞土之牆不可杇也於豫與平聲下同何誅子曰始吾於人也聽其言而信其行今吾於人也聽其言而觀其行於豫與改是宰豫昏惰而溺志夫子以其質之不美也故以朽木糞牆為喻而責之特深蓋害道莫此為甚也聽言而信行蓋聖人之聽言固異乎人之聽言也然又將觀行焉則益精矣謝氏曰聖人之道雖得於生知而亦有待於更事之多也子曰吾未見剛者或對曰申棖子曰棖也欲焉得剛能自克之謂剛蓋莫難制者人欲也為欲所牽志不立矣焉得剛子貢曰我不欲人之加諸我也吾亦欲無加諸人子曰賜也非爾所及也此與已所不欲勿施於人施諸已而不願亦勿施於人同意然而彼二言者皆為仁之方恕之道也故皆有勿辭勿者禁止之意若子貢之言不欲人之加諸已者即欲不加諸人是則不待禁止油然公平物我一視仁者之事也其曰非爾所及者正所以勉其強恕而抑其躐等也子貢曰夫子之文章可得而聞也夫子之言性與天道不可得而聞也文章謂著於言辭者夫子之文章人人可得而聞也至於性與天道則非聞見之所可及其惟濳泳積習之久而有以自得之自得之則性與天道亦豈外乎文章哉曰性又曰天道者兼天人性命之藴而言之也子路有聞未之能行惟恐有聞有所聞而實未副一本作而行之未逮勇者之所恥也惟恐有聞則其篤於躬行可知門人記此亦可謂善觀季路矣然比之得一善拳拳服膺而不失者則未免有強力之意耳子貢問曰孔文子何以謂之文也子曰敏而好學不恥下問是以謂之文也聖人制諡其法非一端蓋取人之周也故經天緯地謂之文而勤學好問亦謂之文子貢疑孔文子不足以當此諡而不知所取各有義其善不可沒而其不足者自不可掩矣子謂子産有君子之道四焉其行已也恭其事上也敬其養民也惠其使民也義子産此四者為得君子之道君子之道亦多矣子産有此四者而已他固未盡得也聖人與人為善故特舉其所長焉行已恭謹重而不侮也事上敬忠實而不欺也養民惠以慈愛涵養之也使民義役之以時用之不私也子産養民惠使民義矣而孟子猶謂不知為政則所謂政者蓋有在矣子曰晏平仲善與人交久而敬之聖人論豫之六二介于石不終日貞吉以為君子上交不諂下交不瀆為知幾蓋交道易以陵夷非正其志者莫之能守也交久而敬不衰亦可謂善矣聖人於人雖一善必録天地之心也一本云以平仲行乎國政之久而其見稱於聖人者獨善交一事則其餘無取焉亦可見也子曰臧文仲居蔡山節藻棁何如其知也所貴乎知者為其明見理之是非也僭上失禮之事而處之不疑則其昧於理孰大於是蓋方其時世俗以小慧為知故於文仲有惑焉夫子明之使人知夫所謂知者在此而不在彼也子張問曰令尹子文三仕為令尹無喜色三已之無愠色舊令尹之政必以告新令尹何如子曰忠矣曰仁矣乎曰未知焉得仁崔子弒齊君陳文子有馬十乘棄而違之至於他邦則曰猶吾大夫崔子也違之之一邦則又曰猶吾大夫崔子也違之何如子曰清矣曰仁矣乎曰未知焉得仁子文文子之事聖人以清忠目之就此事上言只可謂之清忠也而子張遽以仁為問是未能究夫仁者之心也曰未知焉得仁言未知其他據此事言之不得謂之仁也若知微子箕子比干之所以稱三仁則知二子之事只可以為清忠而不可謂之仁矣一本云仁者之為亦有時可以謂之忠清然指人一忠一清事便以為仁則不可季文子三思而後行子聞之曰再斯可矣思至於再則事之是非可否可見矣過是而猶有思焉則是為計較利害而非誠其思者也子曰寧武子邦有道則知邦無道則愚其知可及也其愚不可及也發舒才智為易收斂才智為難非約以自守而不役於外者不能然也曰其愚不可及也謂人所難也然而猶有知愚之心也其與用則行舍則藏者意味相去有間矣子在陳曰歸與歸與吾黨之小子狂簡斐然成章不知所以裁之聖人道不行於當時故退而明諸書以私淑諸人方聖人歷聘之時詩書禮樂之文固已付門人次序之矣及聖人歸於魯而後有所裁定所謂刪詩定書繫周易作春秋也狂簡之士雖行有不掩而其志大蓋能斐然以成章矣至於義理之安是非之平詳略之宜則必待聖人裁之而後為得也子曰伯夷叔齊不念舊惡怨是用希以夷齊平日之節觀之疑其狹隘而不容矣今夫子乃稱其不念舊惡何其宏裕也蓋於其所為亦率夫天理之常而其胸中休休然初無一毫介於其間也若有一毫介於其間則其私意之所執而豈夷齊之心哉味夫子不念舊惡怨是用希之言則庶幾可以得之矣怨是用希者已無所怨於人而人亦無所怨於己也子曰孰謂微生髙直或乞醯焉乞諸其鄰而與之順理之謂直計較作為有纎毫之枉則害於直矣意者時人以微生髙為直故夫子舉此以明直之理子曰巧言令色足恭左丘明恥之丘亦恥之匿怨而友其人左丘明恥之丘亦恥之是皆常人之所忽而不以為恥者惟君子學以為已不忍須臾自欺故以為恥觀諸此則丘明之為人可知矣言已亦恥之以明丘明所恥之為得也顔淵季路侍子曰盍各言爾志子路曰願車馬衣輕裘與朋友共敝之而無憾顔淵曰願無伐善無施勞子路曰願聞子之志子曰老者安之朋友信之少者懷之人而不仁病於有已故雖衣服車馬之間此意未嘗不存焉子路蓋欲克其私於事事物物之間者其志可謂篤而用功可謂實矣至於顔子則又宏焉理之所在何有於己則其於善也奚伐為吾之所當為而已則其於勞也奚施蓋存乎公理而無物我之間也然而猶所謂誠之者人之道至於孔子則純乎天矣物各付物止於其分而無不得焉此誠者天之道也聖賢之分固宜爾然而學者有志於求仁則季路之事亦未宜忽也要當如此用力以為入德之途則夫顔子之事可以馴致不然慕髙逺而屑卑近將終身無所進益而已耳子曰己矣乎吾未見能見其過而內自訟者也人惟安於所偏狃於所習是以鮮能見其過就或知其為過不能自訟又從而文之者蓋多矣能見其過而內自訟則懲創之深省察之力其必能徙舊而新是圖若是則進於德也孰禦子曰十室之邑必有忠信如丘者焉不如丘之好學也聖人斯言使學者知夫聖可學而至雖有其質而不學則終身為鄉人而已忠信者質之美蓋以實而不欺者也聖人不居生知所以勉人以學也雍也篇子曰雍也可使南面有長人之德也仲弓問子桑伯子子曰可也簡仲弓曰居敬而行簡以臨其民不亦可乎居簡而行簡無乃太簡乎子曰雍之言然仲弓問子桑伯子夫子以為可也而取其簡仲弓於此遂發居敬居簡之論可謂善領聖人之意矣夫主一之謂敬居敬則専而不雜序而不亂常而不迫其所行自簡也若夫居簡則是以簡之一字橫在胸中反害於敬而失行簡之本矣故仲弓以為太簡而程子謂多却一簡字者是也如是而曰行簡是為踈略而已夫豈簡之得哉哀公問弟子孰為好學孔子對曰有顔回者好學不遷怒不二過不幸短命死矣今也則亡未聞好學者也凡怒之所以遷者以其起怒於已也於已起怒故溢於氣發於辭橫於胸中而不能化移於他物而莫之止君子非無怒怒其逆於理而已理之所在如鑑付形各適其可已何預乎然則奚遷之有凡過之所以二者以其所以為過之根者不除也不知懲改者固不足問就有能見其過而遏之之心一或有懈則其端復乘間而萌矣君子非無過也隱微之間有所未慊則謂之過惟其涵養純熟天理昭融於過之所形無纎介之滯其化也如日之銷冰然則奚二之有是二者蓋克己復禮心不違仁者之事也如是而後謂之好學然則孔門之所謂學者蓋可知矣有志於道者其可不以此為標的乎子華使於齊冉子為其母請粟子曰與之釡請益曰與之庾冉子與之粟五秉子曰赤之適齊也乘肥馬衣輕裘吾聞之也君子周急不繼富原思為之宰與之粟九百辭子曰毋以與爾鄰里鄉黨乎子華為夫子使於齊使子華而有所不給則夫子固周之也而子華無是之患也其使也為師使以義行也夫以義行而其資足以給則可以無與也冉有為其毋請粟疑可以與也故與之少以見其義而冉子莫喻也原思為宰宰有常祿粟雖多不得而辭也使原思雖甚有餘而其常祿亦豈得而辭哉故聖人於子華謂周急不繼富於原思謂毋以與爾鄰里鄉黨其義可見矣蓋取與辭受莫不有其則焉天之理也聖人從容而不過賢者審處而不違若以私意加之則失其權度或與其所不當與為傷惠而或辭其所不當辭亦反為有害於亷矣子謂仲弓曰犁牛之子騂且角雖欲勿用山川其舍諸此言用人不當以世類而廢也犁牛之子而騂其色是能變其氣類且當其可用之時雖欲不用之於郊而山川之祀亦豈得而廢之乎言其不得不用也聖人之取人廣大無方如此以此語仲弓意者仲弓取人之方或未廣歟觀其問政聞舉賢才之言則曰焉知賢才而舉之與夫子所謂舉爾所知爾所不知人其舍諸者其廣狹固可知矣子曰回也其心三月不違仁其餘則日月至焉而已矣心不違仁私欲不萌天理常存也三月言其久且熟也而猶有不違焉未若聖人之純乎天也顔子之所以為未化者正在此耳日月至焉與三月不違者固有間矣然亦見道明而用力堅者由是而不已焉則亦可馴致矣季康子問仲由可使從政也與子曰由也果於從政乎何有曰賜也可使從政也與曰賜也達於從政乎何有曰求也可使從政也與曰求也藝於從政乎何有此章可見聖人之用才也三子者各有所長故皆可以從政果則有斷斷於義也達則不滯通於理也藝則善裁不失序也此豈獨天資之美哉蓋亦學力所致因其質而有所成就焉耳季氏使閔子騫為費宰閔子騫曰善為我辭焉如有復我者則吾必在汶上矣顔閔曽子不仕於當時蓋易之潛龍而孟子所謂天民之事也方是時行道濟世則孔子之任若三子者雖列國之諸侯有不得而䘵仕之也而况季氏得以臣之乎門人記閔子之事於季康子問由賜冉求之後則其相去亦可見矣伯牛有疾子問之自牖執其手曰亡之命矣夫斯人也而有斯疾也斯人也而有斯疾也如顔子伯牛之死乃可謂之命蓋其修身盡道以至所為謹疾者亦無有憾也而止於是則曰命而已若有取死召疾之道則是有所致而至而非天命之正矣孟子所謂立乎巖牆之下者也子曰賢哉回也一簞食一瓢飲在陋巷人不堪其憂回也不改其樂賢哉回也顔子之樂簞食瓢飲也言簞食瓢飲之貧人所不堪而不足以纍其心而改其樂耳然則其樂果何所樂哉安乎天理而已矣學者要當從事於克己而後顔子之所樂可得而知也冉求曰非不説子之道力不足也子曰力不足者中道而廢今女畫為仁未有力不足者故仁以為已任者死而後己焉今冉求患力之不足非力不足也乃自畫耳所謂中道而廢者如行半塗而足廢者也士之學聖人不幸而死則已矣此則可言力不足也不然而或止焉則皆為自畫耳畫者非有以止之而自不肯前也子謂子夏曰女為君子儒無為小人儒儒而有君子小人之分者固不越乎為已與為人也小人為其所見之小耳區區以為人為心不亦小乎以此告子夏者懼其既博於文而未能反約也然此亦子夏初年時耳孔門弟子之進於學固有月異而歲不同者問答語言抑揚之間要須詳味也子遊為武城宰子曰女得人焉爾乎曰有淡臺滅明者行不由徑非公事未嘗至於偃之室也子遊為宰而夫子以得人為問此政之先務也後之為政者蓋鮮知此義矣行不由徑則所趨無欲速見利之意非公事未嘗至於偃之室則不苟徇於私情然則斯人之存心可謂正矣子遊亦善觀人哉子曰孟之反不伐奔而殿將入門策其馬曰非敢後也馬不進也奔而為殿固已難能及將入門是國人屬耳目之時也孟之反非惟不敢有其功又且自掩其功其中心深自抑損如此故聖人有取焉為學之害矜伐居多聖人取孟之反所以教門人也子曰不有祝鮀之佞而有宋朝之美難乎免於今之世矣必有祝鮀之巧言與宋朝之令色而後可以免於世則世衰道微可知中人以下以利害存心者鮮不為之變易矣此聖人所以歎也子曰誰能出不由户何莫由斯道也道不可須臾離可離非道也即父子而父子在所親即君臣而君臣在所嚴夫婦之有别朋友之有信以至於一飲食起居之間莫不有道焉故曰誰能出不由户何莫由斯道也謂未有出而不由户者何事而不由於道乎道雖不可離如此然人之違之者亦多矣人雖自違之而道亦未嘗離也是以君子敬以持之顛沛必於是造次必於是而惟恐其或失也子曰質勝文則野文勝質則史文質彬彬然後君子文質偏勝則事理不得其中故必以彬彬為貴也彬彬者內外相濟之意非涵養深厚者莫能然也夫有質而後有文質者本也然質之勝則失於踈略而無序故當修勉而進其文是則文者所以行其質也若文或勝焉則失於繁冗而沒實故當敦篤而反其質是則質者所以約其文也此道問學以進於君子者也雖然以二者論之若未得中而有所偏勝與其失而為府史之史無亦寧為野人之野乎亦不可以不知也子曰人之生也直罔之生也幸而免天理本直在人則順其性而不違所謂直也直者生之道循理而行雖命之所遭有不齊焉而莫非生道也罔則昧其性冥行而已是與遊魂為變者相去幾何則其生也特幸免耳子曰知之者不如好之者好之者不如樂之者知之者知有是道也好之者用工之篤也至於樂之則工夫至到而有以自得矣譬之五榖知者知其可食者也好者食之者也樂者食之而飽者也知之而後能好之好之而後能樂之知而不能好則是知之未至也好之而未及於樂則是好之未至也此古之學者所以自強而不息者與子曰中人以上可以語上也中人以下不可以語上也此以其氣質言也聖人之教各因其才而篤焉以中人以下之質驟而語之髙且逺者非惟不能入且將妄意躐等豈徒無益其反害者有矣故不驟而語之以上是乃所以漸而進之使之切問近思而自得之也然而聖人之言本末備具雖自其卑與近者告之而其至理亦豈外乎是特其為教循循有序至於愚之明柔之強則中人以下之質蓋亦有可得而變者矣樊遲問知子曰務民之義敬鬼神而逺之可謂知矣問仁曰仁者先難而後獲可謂仁矣民之義百姓所公共之義如大學所謂民之所好好之民之所惡惡之是也敬鬼神而不能逺是惑而已逺而不敬是忽而已敬而能逺而後為得二者皆知之事也先難後獲先其難而後其獲也勉為其難不計所獲循循不已久自有至若先有蘄獲之意則固已自纍其心而有害於天理矣無妄之六二不耕穫不災畬而象曰未富也蓋此義也子曰知者樂水仁者樂山知者動仁者靜知者樂仁者壽動靜者仁知之體樂水樂山言其體則然也動則樂靜則夀行所無事不其樂乎常永貞固不其夀乎雖然知之體動而理各有止靜固在其中矣仁之體靜而周流不息動亦在其中矣動靜交見體用一源仁知之義非深體者不能識也子曰齊一變至於魯魯一變至於道自當時觀之則齊強而魯弱矣聖人觀人之國蓋不如此齊自管仲相桓公急於功利先王之法廢革殆盡矣魯雖不能舉行先王之法然其法猶在未至若齊之變亂也齊一變而至於魯謂當易其功利之為而反之正也魯一變而至於道則神而明之存乎其人而已味聖人之意則知所以為國之道在此而不在乎彼也子曰觚不觚觚哉觚哉觚而失所以為觚之制其得謂之觚乎故有是物必有是則苟失其則實已非矣其得謂是名哉故凡言君不君臣不臣父不父子不子皆以失其則故也至於人生於天地之中其所以名為人者以天之降𠂻善無不備也失其所以為人之道則雖名為人也而實何如哉聖人重歎於觚意蓋深逺矣宰我問曰仁者雖告之曰井有仁焉其從之也子曰何為其然也君子可逝也不可陷也可欺也不可罔也宰我發此問亦不可不謂之切問也謂仁者惟知求仁患難有所不恤也夫子所以告之者理則無不盡矣蓋其可逝可欺者惻隱之心不逆詐不億不信也而其不可陷不可罔者心與理一一作理不可昧故也於此亦可以究仁者之心矣子曰君子博學於文約之以禮亦可以弗畔矣夫博學於文廣聞見也約之以禮守規矩也聞見雖多而不能約以規矩則操履不實亦豈得不違畔乎故必博文而約禮然後可以弗畔學者必弗畔而後可以有進若顔子所謂博文約禮則異乎是言蓋有輕重也子見南子子路不説夫子矢之曰豫所否者天厭之天厭之當時過衛國者必見寡小君衛人以為請則烏得而不見子路以夫子之見強而出於不得已也故不悅夫子則謂吾道之否如是天實厭吾道則何愠乎此樂天者之事也若使道之將行夫子聽衛國之政則所以正君而定國者必有道矣而不得位以行焉則其在衛國也而見小君庸得已乎此非天而何哉子曰中庸之為德也其至矣乎民鮮久矣德合於中庸則至當而無以加矣中者言其理之無過不及也庸者言其可常而不易也世衰道微民汨於私意以淪胥其常性鮮有是德久矣夫子蓋歎之也子貢問曰如有博施於民而能濟衆何如可謂仁乎子曰何事於仁必也聖乎堯舜其猶病諸夫仁者已欲立而立人已欲達而達人能近取譬可謂仁之方也已博施濟衆之義固大而不當以此言仁也聖亦仁之成名耳非謂仁未及乎此也以仁之為道不當如此求也故夫子既告之以博施濟衆之為大而又語之以仁焉夫仁道難名惟公近之人惟有已則有私故物我坐隔而昧夫本然之理已欲立而立人已欲達而達人於已而譬所以化私欲而存公理也然便以此為仁則未可此仁之方也於其方而用力則可以至於仁焉先言仁者而後以仁之方結之聖人之示人至矣一本云博施濟衆之義固大然博施濟衆特以見夫功用而非所以明仁也聖亦仁之成名非謂仁未及乎此也以仁之為道不當如此求也欲進乎是其惟近取譬乎近取譬者體之於吾身而推之此恕之道也所以為仁之方也於其方而用力則可以進於仁焉知能近取譬為仁之方則知以博施濟衆言仁者其亦泛而無統矣論語解卷三欽定四庫全書論語解卷四宋張栻撰述而篇子曰述而不作信而好古竊比於我老彭述而不作有所傳述而不自作也信而好古言信古而好之也竊比於我老彭老彭亦述而不作信而好古者也聖人之發斯言欲使學者稽古務實而不敢苟作也夫以聖人之德之至而其辭氣遜讓溫厚如此學者所宜反復誦味而不厭也子曰默而識之學而不厭誨人不倦何有於我哉默而識之非言意之所可及蓋森然於不睹不聞之中者也在已則學不厭施諸人則誨不倦成已成物之無息也何有於我哉汲郡吕氏曰言我之道舍是三者之外復何有此説於文義為順蓋聖人常指而示之近使學者能於此求聖人於此學聖人則亦可以有得矣然而是三言者其本在於默而識之世之言默識者類皆想像意度驚怪恍惚而曰吾默識矣不知聖門實學貴於履踐隱微之際無非真實蓋所謂存乎德行者也子曰德之不修學之不講聞義不能徙不善不能改是吾憂也聖人言以是為憂所以深勉學者也夫德不修則無以有諸躬學不講則無以明乎善聞義不能徙則何有於義不善不能改則安於不善而已是豈不可憂乎為學之要不越乎修德講學徙義遷善而已子之燕居申申如也夭夭如也門人可謂善觀聖人矣方燕居之際在衆人易以怠惰若君子則不至於惰然未免於執持也未免於執持其能申申夭夭乎申申和樂中正也夭夭溫裕安舒也一本云申申舒泰也夭夭和洽也聖人聲氣容色之所形如影之隨形無往而不在也子曰甚矣吾衰也久矣吾不復夢見周公夫子夢見周公之心周公思兼三王之心也方夫子盛時庶幾道之將行以周公之事業措之天下雖夢寐間亦思存周公之為而若見其人也至於既老而力衰知道之終不可行也故曰久矣不復夢見焉若以為聖人思念周公而見其儀容於夢則是有所滯而不化且周公不可見而見之夢焉亦甚非聖人之心也子曰志於道據於德依於仁遊於藝涵泳於道履踐於德體切於仁遊涉於藝藝者亦以養吾德性而已子曰自行束修以上吾未嘗無誨焉束修始見禮也苟以禮來聖人未嘗不誨焉人皆可為聖賢聖人未嘗拒其進也子曰不憤不啓不悱不發舉一隅不以三隅反則不復也此聖人教人之方也學貴於思思而後有得憤悱者思慮積久鬱而未暢誠意懇切形於外也憤則見於顔色悱則見於辭氣於是而啓其端發其蔽則庶幾其聽之之専而感之之深也然告之亦舉一隅耳必待其以三隅反而後復之此古之教者所以為從容而使人繼其志之道也若不以三隅反則是未能因吾言而推類苟遽以復之則於彼亦無力矣子食於有喪者之側未嘗飽也子於是日哭則不歌臨喪則哀食何由飽哭者哀之至歌者樂之著一日之間二者不容相襲若此也學者法聖人而勉之亦足以養忠厚之心也子謂顔淵曰用之則行舍之則藏惟我與爾有是夫用之則行舍之則藏龍德正中隨時隱見者也君子所性大行不加窮居不損其行也豈有意行之而其舍也亦豈有意於藏之因時用舍而道有行藏惟顔子幾於化故足以與此子路曰子行三軍則誰與子曰暴虎馮河死而無悔者吾不與也必也臨事而懼好謀而成者也仲由自負其勇不避禍害謂夫子有三軍之事惟已可與故以為言夫子因其病而救之以為犯難而輕死非君子所貴蓋死或至於傷勇故也臨事而懼戒懼於事始則所以為備者周矣好謀者或失於寡斷好謀而成則思慮審而其發也必中矣敬戒周密如此古之人所以能成天下之事而不失也豈獨可行三軍而已哉若徒以暴虎馮河為勇則是輕犯禍害非君子之所貴也子曰富而可求也雖執鞭之士吾亦為之如不可求從吾所好夫子謂富不可求非特謂命有定而不可強也謂命有定而不可強雖賢於僥幸而冒昧者然在聖賢之分則未足道也夫子謂富不可求者正以於義不可故耳言使其於義而可雖執鞭之士亦有時而可為矣其如義不可求何則姑從吾所好而已吾所好者義是也然則所安者義而命蓋有不必言者矣子之所愼齊戰疾事神莫嚴於齋用人莫重於戰養身莫切於疾故尤致其愼焉夫子未嘗親夫戰陳之事也而門人知其所慎者以其平日所言而知其重之也味所謂臨事而懼好謀而成之語則亦可見矣子在齊聞韶三月不知肉味曰不圖為樂之至於斯也韶之盡善盡美聖人聞之有所深感於其中蓋後世雖有作者虞帝弗可及也已然至於三月之久猶忘味焉則幾於不化矣故程子以三月為音字聖人之心不如是其固也冉有曰夫子為衛君乎子貢曰諾吾將問之入曰伯夷叔齊何人也曰古之賢人也曰怨乎曰求仁而得仁又何怨出曰夫子不為也叔齊之讓伯夷以為伯夷之長當立無兄弟之義而何以為國乎伯夷之不受國以為叔齊之立父命也無父子之義而何以為國乎二人者寧去國而存此矣衛輒之事國人論之以為蒯瞶既得罪於先君而出奔而輒受先君之命宗國不可以無主則立輒而拒蒯瞶可也曽不知蒯瞶父也輒子也父子之義先亡而國其可一日立乎故子貢以夷齊之事為問方是時夫子在衛輒立之事蓋難言也賜也微其辭以測聖人之旨可謂善為辭者矣中有所悔慕皆謂之怨其曰怨乎者謂二子委國而去獨不顧其宗國而有所悔於中乎夫子告之以求仁而得仁謂二人者求夫天理之安而已夫豈利害之計乎明乎此而後知古人所以處身謀國之宜矣子曰飯疏食飲水曲肱而枕之樂亦在其中矣不義而富且貴於我如浮雲君子所性大行不加窮居不損飯疏飲水而樂之在其中者亦莫不然然則其於外物也何有故視不義之富貴如浮雲然易曰崇髙莫大乎富貴富貴本非可以浮雲視惟其非義則浮雲耳苟義所當居聖賢固亦居之特所樂不存也一本云濂溪周子嘗令學者尋顔子仲尼所樂何事此不可以想象推尋也惟用力於克已是乃求之之道也子曰加我數年五十以學易可以無大過矣夫子未贊易之前易書殽亂傳者失其旨五十以學易者夫子之意謂今有所未暇加數年而後可修也程子曰如八索之類皆過也云學云大過者皆謙辭也雖然自夫子贊易而易道始備垂於萬世而不過也而後之學者或泥於象數而其義復以不明善乎程子之言曰推辭考卦可以知變象與占在其中矣由辭以求易而明夫所謂體用一源顯微無間者則庶幾聖人學易之旨可得而求也子所雅言詩書執禮皆雅言也夫子常教人者詩書執禮也執禮者人所執行之禮所謂曲禮者也以此三者教人使之涵泳踐履循循有序性與天道亦豈外是而他得哉在學者用工何如耳葉公問孔子於子路子路不對子曰女奚不曰其為人也發憤忘食樂以忘憂不知老之將至云爾子路以葉公不知聖人且欲擬其形容而未知所對也夫子之意則以為即其近者告之斯可矣夫子蓋嘗自謂十室之邑必有忠信獨不如已之好學而今所言發憤忘食樂以忘憂不知老之將至者亦好學之至者也然則聖人之所以異於人者果獨在於好學耶夫子蓋生而知之者而未嘗居焉使人知聖由學而可至也然生而好學則是其所為生知者固亦莫掩矣謂聖人所以異於人者在於好學亦豈不可乎子曰我非生而知之者好古敏以求之者也門人見夫子之聖謂生而知之不可跂及也故夫子以是告之使果能好古敏以求之則聖人亦豈不可希哉玩味辭氣其循循善誘可謂至矣子不語怪力亂神聖人一語一默之間莫不有教存焉語怪則亂常語力則妨德語亂則損志語神則惑聽故聖人之言未嘗及此雖然就此四者之中鬼神之情狀聖人亦豈不言之乎特明其理使人求之於心而已若其事則未嘗言之也門人記聖人之所雅言與夫所不語者而垂教焉抑可謂察之精矣子曰三人行必有我師焉擇其善者而從之其不善者而改之見人之善不善也而皆我師焉古人之學無非為已而己雖然就一人之身而有善有不善焉亦莫非吾師也擇其善者而從之其不善者而改之此蓋進善無窮之意非若老氏以不善人為資而利之也夫有利之之心則是己自陷於不善也毫釐之差君子謹諸子曰天生德於豫桓魋其如豫何天生德於豫言天命德於己也天命德於已桓魋其如之何使不幸而不免於難亦天也桓魋其亦如之何哉雖然人受天地之中以生天之生斯人無不具德於其性也人則自息之耳惟聖人為能全夫天之所命曰天生德於豫而所為與天理無間者亦自可見矣子曰二三子以我為隱乎吾無隱乎爾吾無行而不與二三子者是丘也夫子之道猶天然門弟子學焉而莫及則疑以為有隱夫子從容告之曰二三子以我為隱乎吾無隱乎爾蓋道無不在聖人何隱乎爾所謂無行而不與二三子者蓋視聽言動之際無非教也二三子苟能體之自近而用力焉則知聖人果無毫髮之可隱也在二三子勉之何如耳子以四教文行忠信聖人之教人不越乎是四者學文則知廣敦行則身修忠信則德進學者勉於是則內外交益日有所進而月有所將也忠信本一事而謂之四教者忠則實諸已信則篤諸人在學者之成身當以為兩事而並勉也文居其首者教以博文為先也子曰聖人吾不得而見之矣得見君子者斯可矣子曰善人吾不得而見之矣得見有恆者斯可矣亡而為有虛而為盈約而為泰難乎有恆矣聖人君子以學言善人有恆者以質言聖人者肖天地者也君子者具其體而未能充盡者也故聖人不得而見得見君子斯可矣善人資稟醇篤無惡之稱有恆者則能謹守常分而已故善人不得而見得見有恆者斯可矣以善人之質而進學不已聖蓋可幾有恆者力加勉焉亦足以有至也若夫已無而以為有已虛而以為盈在約而以為泰則是驕矜浮虛不務實者其能以有恆乎未能有恆況可言學乎子釣而不綱弋不射宿此聖人愛物之心也釣而不綱不欲盡物也弋不射宿不忍乘危也於此亦可玩味聖人之仁心矣子曰蓋有不知而作之者我無是也多聞擇其善者而從之多見而識之知之次也天下之事莫不有所以然不知其然而作焉皆妄而已聖人之動無非實理也其有不知而作者乎雖然知未易至也故又言知之次者使學者有所持循由其序而至焉多聞擇善而從多見而識其善此雖未及乎知之至然知之次也擇焉識焉而不已則其知將日新矣互鄉難與言童子見門人惑子曰與其進也不與其退也唯何甚人潔已以進與其潔也不保其往也以互鄉之俗惡而童子又非得與先生長者抗禮者而夫子見之故門人惑焉夫子謂其進之志則善與其進之志善也而不與其退而不善也若於進而志善之時以其退而不善而拒之則何甚也聖人之心天也其有己甚者乎則又反復言之謂凡人潔已以進則當與其潔耳固不可保其往也此所謂顯比王用三驅至公之心也子曰仁遠乎哉我欲仁斯仁至矣仁豈遠於人乎患人不欲之耳欲之斯至不曰至仁而曰斯仁至矣蓋仁非有方所而可往至之也欲仁而仁至我固有之也陳司敗問昭公知禮乎孔子曰知禮孔子退揖巫馬期而進之曰吾聞君子不黨君子亦黨乎君取於吳為同姓謂之吳孟子君而知禮孰不知禮巫馬期以告子曰丘也幸苟有過人必知之他國之大夫問吾國之君知禮與否則但可告之以知禮而已及巫馬期以司敗之言告則又豈可謂取同姓為知禮乎若言為君隱之意則淺露已甚而失前對之本意矣故但引已之過而已然而取同姓之為非禮其義固已在其中矣聖人辭氣之間其天地造化與子與人歌而善必使反之而後和之歌者歌詩也於其歌之善也使反之而後和非獨與人為善也反復抑揚至於再三則所以感人者益深矣是亦所以長其善也與子曰文莫吾猶人也躬行君子則吾未之有得言文吾無不與人同者於躬行之君子則未見聖人之意欲使學者不但既其文而務孚其實也夫所謂文者威儀藝文之事可得而見者也躬行之實則在夫縝密篤至存乎人之所不見者也此顔閔之徒所以獨出於衆人者歟子曰若聖與仁則吾豈敢抑為之不厭誨人不倦則可謂云爾已矣公西華曰正唯弟子不能學也夫子雖不居聖然玩味辭氣其所以為聖者亦可得而見矣夫盡仁道者聖人也為之不厭誨人不倦聖人之仁天之無疆也子疾病子路請禱子曰有諸子路對曰有之誄曰禱爾於上下神祗子曰丘之禱久矣子路請禱而夫子告之以有諸蓋欲子路深省夫禱之理也苟知其有是理則知夫子之何用禱也而子路未之達獨舉誄以為證於是從而告之曰丘之禱久矣蓋禱者悔過遷善之意平日之思慮云為神之聽之未嘗斯須離也一有未順則逆於神理是則當禱也若夫聖人之心則所謂天且弗違而況於鬼神乎獨曰丘之禱久矣辭氣謙厚而所以啓告子路者亦至也子曰奢則不孫儉則固與其不孫也寧固奢儉皆為失中奢則不孫為其矜夸也儉則固為其拘執也雖然固之為病特未能趨於中耳而其所為自守者猶近本焉至於不孫之為害則馳騖畔散惡之所由起也聖人斯言非勉學者為儉而已也蓋使之知夫奢之為害之甚而儉猶可取則庶有得於務本趨約之意云耳子曰君子坦蕩蕩小人長戚戚正已而不求諸人故坦蕩蕩徇欲而不自反故長戚戚坦蕩蕩非謂放懷自適無所憂慮之謂也謂求之在已而無必於外故常舒泰云耳子溫而厲威而不猛恭而安和順充積則其發見必溫然溫而厲也德盛者其威必著於外然威而不猛也從容中理者其貌必恭然恭而安也溫而不厲則和而無制有害於溫矣威而猛則為物所憚有病於威矣恭而不安則不可以持久有損於恭矣從容而全盡者其惟聖人乎門人形容至此亦可謂善學矣泰伯篇子曰泰伯其可謂至德也已矣三以天下讓民無得而稱焉三讓程子曰不立一也逃之二也文身三也夫泰伯之讓誠難知也以君之元子而棄宗國以逃身本中夏而從夷狄之為不亦冒先王之大禁歟而泰伯安然行之非聖人孰能明其為至德也至德謂德之至也泰伯知文王有聖德天之所命當使天下被其澤故致國於王季為文王也故曰以天下讓言其至公之心為天下而讓也變而止乎中非達權樂天者其能與於此乎惟其事情深逺故民無得而稱而聖人獨知其為至德也或曰泰伯之心知文王得國則周必有天下乎非然也以是存心則是利夫天下者也泰伯知文王得國則天下必被其澤而已至於周之有天下則泰伯豈加毫末於此哉此又不可以不知也子曰恭而無禮則勞愼而無禮則葸勇而無禮則亂直而無禮則絞恭愼勇直皆善道也然無禮以為之本則過其節而有弊反害之也蓋禮者其節之存乎人心者也恭而無禮則自為罷勞慎而無禮則徒為畏懼勇而無禮則流於陵犯直而無禮則傷於訐切然則其弊如此其貴於恭慎勇直者何哉蓋有禮以節之則莫非天理之當然無禮以節之則是人為之私而已是故君子以約諸已為要也君子篤於親則民興於仁故舊不遺則民不偷君子謂在上者也篤於親而民興於仁故舊不遺而民不偷蓋仁義之心人皆有之有以示之斯感而應矣夫上之人所為若是者非為欲以動民而為之也敦篤於吾之所當為而其應自爾也曾子有疾召門弟子曰啓豫足啓豫手詩云戰戰兢兢如臨深淵如履薄冰而今而後吾知免夫小子曾子當死生之際其言如此與易簀之意同蓋安死順生純是義理也啓手足之義示保其身而無傷也戰兢臨履曾子平日之心敬而無失至是而知免於戾所謂全而歸之也夫以形體言之且不可傷則其天性可得而傷乎舉其顯而隱者可知矣曾子有疾孟敬子問之曽子言曰鳥之將死其鳴也哀人之將死其言也善君子所貴乎道者三動容貌斯遠暴慢矣正顔色斯近信矣出辭氣斯遠鄙倍矣籩豆之事則有司存所貴乎道者三事謂其動容貌而能循於法則也正顔色而根於誠實也出辭氣而不悖於倫理也此三者豈可驟為而強致哉必也平日莊敬篤實涵養有素而後其發見乃能如此此所貴夫道也若此則禮之本既立矣至於刑名度數之事則付之有司使任職焉可也蓋本既立則末無不舉矣意者孟敬子務詳於末而未知其本故歟一本云或曰此與非禮勿視勿聽勿言勿動之意同乎曰有異哉夫子之言制於外所以養其中也曽子之言存於中而以正其外者也學者當識內外交正之意曾子曰以能問於不能以多問於寡有若無實若虛犯而不校昔者吾友嘗從事於斯矣以能問於不能以多問於寡樂善而無厭也有若無實若虛有善而不居也犯而不校不動於血氣而安於理也非心不違仁者其能之乎嘗從事於斯者蓋顔子由克已以至於無我也曾子曰可以託六尺之孤可以寄百里之命臨大節而不可奪也君子人與君子人也可以託孤可以寄命與夫臨大節而不可奪非剛毅篤實者其能之乎曰君子人與疑辭也君子人也斷辭也言其人雖未盡君子之道而節操若是可以謂之君子乎蓋謂之君子則可也曾子曰士不可以不𢎞毅任重而道逺仁以為已任不亦重乎死而後已不亦遠乎𢎞有寬廓之意毅有特立之意𢎞與毅相須者也士之所任者重而其道逺非𢎞毅則何以勝其重而致其逺乎所為任之重者以仁為已任故也仁者人之道為士者求所以盡人之道其任重矣然所為仁者其道蓋無窮非可以易進而速成也用力以終吾身焉顧所至何如耳然則非𢎞毅其可哉子曰興於詩立於禮成於樂此學之序也學詩則有以興起其性情之正學之所先也禮者所據之實地學禮而後有所立也此致知力行學者所當兼用其力者也至於樂則和順積中而不可以已焉學之所由成也此非力之可及惟久且熟而自至焉耳子曰民可使由之不可使知之此言聖人能使民由是道而不能使民知之也凡聖人設教皆使民之由之也聖人非不欲民之知之然知之係乎其人聖人有不能與故曰不可使知之然使之由之所謂知之之道固在其中矣蓋有由之而不知者未有不由而能知之者也然則孟子所載放勳之言曰使自得之者與此異乎無以異也蓋曰自得則亦係乎彼而已子曰好勇疾貧亂也人而不仁疾之已甚亂也好勇則果於為如是而疾貧能無為亂乎不仁之人疾之過甚無所容身能無為亂乎此二者在上者不可以不知也先王有以厚民之生使其有勇者不至於疾貧有以養其不才使其不仁者不至於無所容斯已亂之道也子曰如有周公之才之美使驕且吝其餘不足觀也已此言才美之不足恃當以德為貴也古之聖人如周公者才藝之多故借以名之驕則無以來天下之善吝則不能與人共由於善雖才美如周公亦何為哉蓋驕者氣盈挾其有也吝者氣歉懷不足也害德者固多端而二者其總目也蓋徇於血氣者不失之盈則失之歉耳子曰三年學不至於穀不易得也榖者取其成實之意故以訓善焉善者實也三年學矣而不至於善善之難得也如此然則可不孜孜以自強乎為仁由已勉而不舍自有所至固不可以預期嵗月而逆計所成也聖人勉學者之意深矣子曰篤信好學守死善道危邦不入亂邦不居天下有道則見無道則隱邦有道貧且賤焉恥也邦無道富且貴焉恥也此章言士之自處當如是然篤信好學其本歟惟篤信好學而後能守死善道蓋非見善之明則其能守之而不易乎危邦不入者不入其國也亂邦不居者雖在其國而可去之也有道則見道可行之時也貧賤則可恥以其無可行之實故也無道而隱道不可行之時也富貴則可恥以其屈巳而喪道故也子曰不在其位不謀其政止其分也謀其政云者巳往謀之也若有從吾謀者則有時而亦可以告之矣子曰師摯之始關雎之亂洋洋乎盈耳哉聖人自衛反魯然後樂正雅頌各得其所師摯實傳其聲音者也子曰狂而不直侗而不願悾悾而不信吾不知之矣狂者進取侗者未有知悾悾者拘執然是三者有可以進學之理蓋進取者不為枉曲而直可取也未有知者不敢自以為能而願可取也拘執者不敢食其言而信可取也由是而教行焉則可救其所短而進之於道若狂而不直侗而不願悾悾而不信則又巧偽生於其間併與其可取者而去焉無為足望矣子曰學如不及猶恐失之學者當常懷不及之心懷不及之心猶恐夫心之或放也況於自是自恕者乎以一善自居以一知自喜自足者也今日不為曰姑待明日小事故過曰為其大者自恕者也此皆人欲所由長而本心所由失也子曰巍巍乎舜禹之有天下也而不與焉舜禹之有天下豈有一毫與乎其間哉天與之人與之耳天與之人與之舜禹順乎天人之心而履乎其位於我何加哉此其德所以為巍巍也子曰大哉堯之為君也巍巍乎唯天為大唯堯則之蕩蕩乎民無能名焉巍巍乎其有成功也煥乎其有文章此章言帝堯君道之大也天下之巍巍崇髙者莫若天之為天也而堯法則之曰則之則無一毫不與天相似矣堯之道蕩蕩廣大無所不該而其用則密故民無得而名民雖無得而名然巍巍之成功煥乎之文章不可掩也蓋其功業文章乃其道之顯見者也其至賾者不可得而窺而其至顯者不可得而隱天之道然也聖人之道然也舜有臣五人而天下治武王曰豫有亂臣十人孔子曰才難不其然乎唐虞之際於斯為盛有婦人焉九人而已此所謂才者言能全盡夫天生此民之才者也如左氏稱才子必齊聖廣淵明允篤誠之類舜之五臣武王之十亂皆相與共成天下之治者非但可任一職而已也邑薑助成正家之事而天下治焉亦婦人之有聖德者也三分天下有其二以服事殷周之德其可謂至德也已矣三分天下有其二以服事殷非特文王也武王之初亦然故統言周之至德不但曰文王也蓋紂未為獨夫文武固率天下以事紂者也三分天下有其二天下之歸往如此而翼翼小心以盡其臣子之恭非德合中庸者其能之乎故稱至德也子曰禹吾無間然矣菲飲食而致孝乎鬼神惡衣服而致美乎黻冕卑宮室而盡力乎溝洫禹吾無間然矣禹之有天下無所與於已故飲食則菲衣服則惡宮室則卑所欲不存焉而於事神之際則盡其誠於朝廷之禮則盡其敬於保民之事則盡其力皆所以成其性耳惟其不存於彼故能克盡於此再言其無間者言其無可得而議如此也此與惡旨酒而好善言之意同禹之為聖本由學而成皆其工夫至到者也論語解卷四欽定四庫全書論語解卷五宋張栻撰子罕篇子罕言利與命與仁夫子之言明其義之所當然耳義所當然則亦無不利者夫子特罕言之也至于命與仁凡夫子之所言何莫非是理而何隱乎爾也在學者潛心何如耳然夫子未嘗指言之也謂之罕亦可矣達巷黨人曰大哉孔子博學而無所成名子聞之謂門弟子曰吾何執執御乎執射乎吾執御矣達巷黨人大孔子之博學而疑其不能以遍成也夫豈知本末精粗一以貫之之道哉故夫子但舉一藝自居而又于藝之中復居其次者以見夫道之無乎不在若善觀聖人則于此亦可以得之不然則愈失之也其言則謙而不居其意則完備矣子曰麻冕禮也今也純儉吾從衆拜下禮也今拜乎上泰也雖違衆吾從下聖人于斯世豈有意于從違哉皆道之所在焉耳於其儉則不嫌于從俗于其泰則不避于違衆聖人之意蓋可見矣子絶四毋意毋必毋固毋我聖人豈獨無意哉蓋發于心者莫非實理無一毫私意也若有所作為皆私意耳必者必欲其然也固者執而不化也我者有已也意與我相近必與固相類然而不同也意則發見而我則其所存也必則期于事之前而固則凝於事之後也毋字與無通夫子之于四者非待有所禁止蓋自無有耳絶云者無之甚也然四者之病始于意而成于我故大學之道必在於誠其意子畏于匡曰文王既沒文不在兹乎天之將喪斯文也後死者不得與于斯文也天之未喪斯文也匡人其如豫何文也者所以述是道而有傳也文王既沒文不在兹聖人以斯文為已任也已之在與亡斯文之喪與未喪係焉是二者豈人之能為哉天也不曰喪已而曰喪斯文蓋已之身即斯文之所在也方夫子畏於匡之時所謂易詩書春秋皆未討論也故以為天之將喪斯文則後死者不得與于斯文夫使後死者而果不得與于斯文則其不免于難亦非匡人之所能為也汲郡吕氏曰畏者有戒心也太宰問于子貢曰夫子聖者與何其多能也子貢曰固天縱之將聖又多能也子聞之曰太宰知我乎吾少也賤故多能鄙事君子多乎哉不多也太宰見夫子多能而疑其聖者在此故云然子貢則謂夫子蓋天命以大聖之質多能特其餘耳夫子聞之恐太宰謂聖必待多能則甚有害也故謙以自居其意則欲太宰知夫多能雖不害其為君子然為君子不在多能也故曰君子多乎哉不多也牢曰子云吾不試故藝謂不試于事業故所見者藝而已門人載牢所記夫子之言于此申前章之意也子曰吾有知乎哉無知也有鄙夫問于我空空如也我叩其兩端而竭焉此章之意亦恐學者以聖道為髙逺而聖人為有隱也曰吾有知乎哉無知也謂爾以為吾有餘知乎蓋無餘知也凡所以告二三子者無不盡矣雖使鄙夫持空空之質而問所以告之者亦未嘗不就其兩端而無不盡者焉蓋語近而其逺者未嘗不具焉語卑而其髙者未嘗不存焉形而上曰道形而下曰器而道與器非異體也聖人有隱乎爾哉在學者體之何如耳子曰鳳鳥不至河不出圗吾已矣夫非必鳳至圖出而後為至治之世鳳至圗出蓋治世之徴也聖人斯言歎明王之不興而道之終不行耳子見齊衰者冕衣裳者與瞽者見之雖少必作過之必趨愛敬生于中而形於外惟聖人為能有常而無失也于齊衰哀有喪也於冕衣裳貴達尊也于瞽者矜困窮也推之則帝王所以治天下之綱要也顔淵喟然歎曰仰之彌髙鑽之彌堅瞻之在前忽焉在後夫子循循然善誘人博我以文約我以禮欲罷不能既竭吾才如有所立卓爾雖欲從之未由也已仰之彌髙愈探而愈覺無窮也鑽之彌堅愈進而愈覺難入也瞻之在前則若不及忽焉在後則又過之蓋得其中為難也非工夫深至者其能發是言乎雖然其髙未易攀也其堅未易入也聖人之中未易可得也而夫子則循循然善誘人從容不迫以其序而進之其所為循循善誘者不過博文約禮而已博文者使之集衆義于見聞之間也約禮者使之宅至理于隱微之際也一作博文格物致知也約禮克已復禮也博而約學之大端不越是矣惟夫子循循善誘如此故使我欲罷不能焉蓋自不能以已也既竭吾才如有所立卓爾盡吾之才以極其至則見夫所立之卓爾必曰如有言其始見之端的者然也卓爾者其聖人之中歟雖欲從之末由也已言已雖見是而不能遂止于是蓋誠者天之道由誠之而進非大而化不能以與此蓋至此非力之所能為也此顔子之所以喟然歎歟反復誦味此章則顔子學聖人始終之功孔子教人先後之序與夫聖人之道之至皆可得而研求矣子疾病子路使門人為臣病間曰久矣哉由之行詐也無臣而為有臣吾誰欺欺天乎且豫與其死于臣之手也無寧死于二三子之手乎且豫縱不得大葬豫死於道路乎子路欲為臣之意以夫子嘗為大夫有家臣以任其喪事蓋不為過意欲尊其師也不知方是時夫子退而間處無家臣之時也因疾之病而強為之是欺而已理不應有而強使之有故曰欺天子路孔門之髙弟而所見若是之偏者蓋意有毫釐之差則流于欺詐而不自覺耳故君子戰兢自持而每懼其或偏也子貢曰有美玉于斯韞櫝而藏諸求善賈而沽諸子曰沽之哉沽之哉我待賈者也子貢以美玉為喻疑夫子將終藏不售也夫子則以君子豈不欲用於世乎其不輕售者待其可耳子貢謂求善賈則非矣待賈者循乎天理而求善賈則已心先動矣子欲居九夷或曰陋如之何子曰君子居之何陋之有欲居九夷與乘桴浮海之歎同或人未之喻則以為真欲往也故疑其陋以為不可居夫子之所以告之者乃行乎夷狄之道蓋忠信篤敬無入而不自得也子曰吾自衛反魯然後樂正雅頌各得其所聖人未刪詩以前篇章交錯不以其序者亦多矣故反魯之後然後樂正雅頌各得其所獨舉雅頌蓋其大者耳子曰出則事公卿入則事父兄喪事不敢不勉不為酒困何有于我哉此章視之若易能然行之而無憾則未易也蓋于天理之當為者求盡其道而于人情之易動者不踰其則雖聖人亦極乎是理而已夫子之教人每指而示之近使之有履踐之實人人皆可勉焉行而有至則存乎其人充盡則聖人矣子在川上曰逝者如斯夫不舍晝夜此無息之體也自天地日月以至于一草木之微其生道何莫不然體無乎而不具也君子之自強不息所以體之也聖人之心純亦不已則與之非二體矣川流蓋其著見易察者故因以明之子曰吾未見好德如好色者也好德因人之秉彛而目之于色亦出于性也然此則溺其流而不止彼則汨其情而不察是何歟則以夫物其性故耳故君子性其性而衆人物其性性其性者天則之所存也物其性者人欲之所亂也若好德如好色則天則存而人欲遏性情得其正矣子曰譬如為山未成一簣止吾止也譬如平地雖覆一簣進吾往也雖覆一簣然進則不可量雖餘一簣然止則無所望學以成德為貴也止者吾止也進者吾往也進止係乎已而由人乎哉子曰語之而不惰者其回也與若以不惰為専心致志則其他門人髙弟亦能然何獨回也所謂語之而不惰者謂不惰其言也蓋顔子聞夫子之言默識心通躬行實踐是夫子之言昭明發見于顔子日用中也此之謂不惰子謂顔淵曰惜乎吾見其進也未見其止也此顔子既沒之後夫子稱之之辭也蓋其日進無疆于聖為幾矣然未至于聖則猶有所進焉至于聖則止矣所謂止者大而化之止于中而成乎天也此顔子所以有雖欲從之末由也已之歎與橫渠張子曰未至聖而不已故仲尼賢其進未得中而不居故惜乎未見其止子曰苗而不秀者有矣夫秀而不實者有矣夫養苗者不失其耘耔無逆其生理雨露之滋日夜之養有始有卒而後可以臻厥成或舍而弗耘或揠而助長以至于一暴十寒則苗而不秀秀而不實矣學何以異于是有其質而不學苗而不秀者也學而不能有諸已秀而不實者也夫仁亦在夫熟之而已矣子曰後生可畏焉知來者之不如今也四十五十而無聞焉斯亦不足畏也已後生可畏以其進之不可量也然苟至于四十五十猶于道無所聞則其不能激昂自進可知因循至是則亦無足畏者矣辭氣抑揚之間學者所宜深味也雖然有至于四十五十而知好學如中庸所謂困知勉行者聖人猶有望焉若後生雖有美質而悠悠嵗月則夫所謂四十五十者將轉盼而至可不懼哉子曰法語之言能無從乎改之為貴巽與之言能無説乎繹之為貴説而不繹從而不改吾末如之何也已矣法語之言明義而正告之也如孔子對齊景公君君臣臣父父子子之類是已巽與之言委曲而開導之也如孟子告齊宣王是心足以王矣之類是已自非肆于惡而無所忌憚者其聞法語之言也能無面從乎其聞巽與之言也能無悅于心乎然而聞善者將以善其身也于法言則當佩服躬行而改其未合者于巽言則當紬繹思慮而究其所以然者若是斯有以善其身矣苟惟心悅而不繹其故面從而不改其非則亦何有于已哉故雖聖人亦末如之何也子曰主忠信無友不如已者過則勿憚改成都范氏曰如此類皆夫子所常言弟子各以所聞記之故又見于此子曰三軍可奪帥也匹夫不可奪志也志者中有所主也三軍雖衆其帥可奪者資諸人故也匹夫雖微有志則不可奪者存諸已故也夫使志而可奪則不得謂之志矣雖然此所謂志謂守其道而不渝如虞人非其招不往之類是也若守認私意而不知徙義則是失其所主謂之任意則可耳非志也子曰衣敝緼袍與衣狐貉者立而不恥者其由也與不忮不求何用不臧子路終身誦之子曰是道也何足以臧衣敝緼袍與衣狐貉者立而不恥此不可作細事看惟不忽於卑近實用力于斯者乃知其末易耳蓋人惟有已而有物有物故有忮有已故有求不忮不求則私欲不行而善道可進將何用而不善子路聞夫子之言以為道如是足矣遂有終身誦之之意夫不忮不求非不善也而子路終身誦之則不足以為善矣蓋不忮不求之外必有事焉至于聖不可知皆由道而進也苟終身誦夫不忮不求而已則亦不過于利仁者之事而有所止也聖人先後抑揚所以成德達才之道可謂至矣子曰嵗寒然後知松柏之後雕也力量之淺深平時未易見也惟當利害艱難之際則可見其所守者矣人徒見其臨事之能處也而不知其自守之有素也松柏之質堅剛矣獨于嵗寒之時而後人知其後雕耳子曰知者不惑仁者不憂勇者不懼三者天下之達德君子之所以成身也不惑者見理明也不憂者其樂深也不懼者守已固也然固有不惑不懼而其樂未充者涵飬其德性未至也不憂其深矣乎子曰可與共學未可與適道可與適道未可與立可與立未可與權志于正而不他然後可與共學而由其序然後可與適道有諸已然後可與立充實積久理明義精然後可與權事事物物莫不有中中者天理之當然不可過而不可不及者也毫釐之差則失之矣何以取中而不失乎所以貴于能權也權者權其輕重而適其平之謂此君子所以貴于時中也或者不知權之所以為中乃指為反經合道夫經者道之所以為常也權者所以權其變而求合夫經也既反經矣尚何道之合乎以至於堯舜之禪湯武之伐周公之誅蓋亦如夫夏葛冬裘飢食渴飲當其可而已非理明義精疇足以識之哉唐棣之華偏其反而豈不爾思室是逺而子曰未之思也夫何逺之有此夫子所刪去之詩亦非今所存唐棣篇中語也其意則以為唐棣之華則翩其反矣非不爾思而室則逺矣夫子謂道非逺人特未之思耳以詩語之未安也故刪而不取詳味夫子斯言辭則抑揚意蓋無窮也夫道以為易知乎則精微之際未易可擇也以為難知乎則其天然之理本自不隱也曰易則學者將忽而不克究曰難則學者將怠而不知進曰未之思也夫何逺之有而顯微之幾循求之序亦涵蓄而備盡矣鄉黨篇此篇所記于夫子言語容貌衣服飲食之際可謂察之精矣門人亦善學聖人哉蓋聖人之道如是其髙深也茫然測度懼夫泛而無進德之地也故即其顯見之實而盡心焉存而味之則而象之於此有得則內外並進體用不離而其髙深者為可以馴致矣真善學聖人者哉百世之下讀是篇者亦可以知所用力也孔子於鄉黨恂恂如也似不能言者恂恂信順之貌似不能言者自卑而先人也信順而貴讓處鄉黨之道則當然也其在宗廟朝廷便便言惟謹爾便便于事敬肅也言惟謹于言簡嚴也在宗廟朝廷則當然也朝與下大夫言侃侃如也與上大夫言誾誾如也河東侯氏曰誾誾中正而敬也侃侃和樂而敬也敬一也誾誾侃侃上下之交也君在踧踖如也與與如也此君在位之時在朝在廟燕見皆然也楊氏曰踧踖不敢寧處也張子曰與與容色不忘向君也君召使擯色勃如也足躩如也揖所與立左右手衣前後襜如也趨進翼如也賔退必復命曰賔不顧矣色勃如者變色也足躩如者改容也承君命而起敬也揖所與立左右手順所向也衣前後襜如左右手而衣亦隨之合節也趨進翼如如翼之張也賔退必復命者敬終其事而紓君敬也此皆為擯相之時容節然也入公門鞠躬如也如不容立不中門行不履閾過位色勃如也足躩如也其言似不足者入公門則改容而不敢少肆非必君之在焉也立不中門避所尊也行不履閾行以度也行不履閾非獨入公門為然特于此記之耳過位色勃如也足躩如也其言似不足者過位亦君不在焉之時也其言似不足者雖在君虗位之前與人言亦不敢少舒也夫君不在焉而莊敬也如此則其事君之誠可知矣若以為虗位而不之起敬則履霜堅冰所致有不可勝言者矣攝齊升堂鞠躬如也屏氣似不息者出降一等逞顔色怡怡如也沒階趨進翼如也復其位踧踖如也摳衣而升公堂則容改矣屏氣如無息心莊而氣肅也出降一等色始舒也沒階翼如復位踧踖始終以敬也自攝齊升堂以下升而有事于公堂之節也自出降一等以下降歸其班列之節也此君在之時也執圭鞠躬如也如不勝上如揖下如授勃如戰色足蹜蹜如有循享禮有容色私覿愈愈如也執圭鞠躬如不勝敬其事若不克也上則如揖下則如授升降之容也勃如戰色戒懼也足蹜蹜如有循不舉足而曳踵也此皆以重圭之故也大夫聘于他國則執圭享禮有容色程子曰享燕之時一于莊則情不通此既聘而享之時也私覿愈愈如也既享而私覿則又和悅矣自其在宗廟朝廷以下皆孔子為大夫時出入起居之節也君子不以紺緅飾紅紫不以為褻服紺齊服緅練服不以飾别嫌疑重喪祭也紅紫間色不以為褻服君子無時不居正也范氏曰言君子則不獨夫子凡君子皆當然當暑袗綌絺必表而出之袗單也表而出之孔氏曰加上衣也蓋嫌其見體耳一衣服之間莫不有義存焉豈苟云乎哉緇衣羔裘素衣麑裘黃衣狐裘內外以稱也君子惡夫不稱也褻裘長短右袂孔氏曰裘長主溫袂短便事必有寢衣長一身有半程子曰疑上文當連齊而言故曰必有蓋齊日不用常日之寢衣所以致其嚴也長一身有半因是而言寢衣之制也狐貉之厚以居尹氏曰居家居也家居取其適于溫而已若夫接賔客之際固不可去喪無所不佩異吉凶也佩亦有所當佩楊氏曰佩非特玉而已蓋若觽礪之類皆佩焉非帷裳必殺之楊氏曰裳亦有殺惟朝祭之服用正幅如帷然則不殺蓋朝祭之服義取于正幅而已其他固當殺也羔裘玄冠不以弔弔必變服稱其情也吉月必朝服而朝程子曰孔子在魯致仕時月朔朝也蓋雖致其事而猶往月朔之朝盡為臣之恭也齊必有明衣布齊必變食居必遷坐明衣布孔氏曰沐浴衣也此正與必有寢衣義同必有寢衣合在此句下變食遷坐蓋皆變易其常致敬而不敢遑寧也食不厭精膾不厭細食飯也或曰厭當作平聲言不待精細者而後屬厭也蓋聖人于飲食非有所擇也苟非如下所云不食之類則食無精粗皆可以飽耳食饐而餲魚餒而肉敗不食色惡不食臭惡不食失飪不食不時不食割不正不食不得其醬不食饐傷濕也餲味變也餒潰而耗也敗渝而壞也色惡非其本色也臭惡失其芬香之正也失飪失生熟之節也不時非食時也割不正解牲之不以其制也不得其醬調味之不以其宜也割不正疑是謂燕享之時耳夫飢而食天之理也聖人所欲不存豈有一毫加意于此哉而有所不食者亦以其理之所未安耳蓋從容乎天則如此肉雖多不使勝食氣唯酒無量不及亂沽酒市脯不食不撤薑食不多食食以五榖為主肉氣不可使勝榖養生之道則然也彼徇於味者則豈是之思哉飲酒隨其多寡之分主于不及亂而已程子曰不獨不可亂志只血氣亦不可使亂浹洽而已可也沽酒市脯不食謝氏曰與康子饋藥不敢嘗同意食不去薑辛甘皆所以養亦不可闕也不多食食以節也聖人衛生之嚴如此非私其身也蓋無乎不盡其道而已在他人非慢易以輕身則取利以自私而已祭于公不宿肉祭肉不出三日出三日不食之矣公家之祭不宿肉受神惠于公所欲亟以及人也家祭之肉不出三日懼其或敗而起人之褻易非事神之道也故或出三日則寧不食焉一本云出三日則人將不食而厭棄之非所以敬神之意也食不語寢不言先儒謂自言曰言答述曰語専一于寢食非言語時也雖疏食菜羮瓜祭必齊如也食必祭先農菜必祭先圃蓋報本之義故物雖粗薄而于其祭也必亦致其嚴肅焉誠之所存非徒然也席不正不坐正于外所以養其中也舉此一端他皆然耳鄉人飲酒杖者出斯出矣少而從長順也舉此一端餘可見也鄉人儺朝服而立于阼階禮之有儺所以驅攘癘氣有是理故有是事也朝服而立于阼階敬其事且以存室神也問人于他邦再拜而送之誠于其所問也康子饋藥拜而受之曰丘未逹不敢嘗大夫有賜拜而受之禮也未逹而不敢嘗謹疾也不以告則害于直故敬受而直告之于此一事之間而得三善焉廄焚子退朝曰傷人乎不問馬仁民愛物固有間也方退朝始聞之時惟恐人之傷故未暇及于馬耳君賜食必正席先嘗之君賜腥必熟而薦之君賜生必畜之敬君之賜也正席而嘗以示變也用之祖考示不敢易也楊氏曰食則或恐餕餘故不敢祭惟腥乃可熟而薦也生則畜之以待有事無故不敢殺也侍食於君君祭先飯程子曰恐君之客已也蓋禮賜之食而君客之則命之祭然後祭今於君之祭已即先飯如為君嘗食然恐君之客已而不敢當也必先飯者以食為先也疾君視之東首加朝服拖紳雖不興不忘恭也君命召不俟駕行矣孟子曰孔子當仕有官職而以其官召之也若非當仕而以其官召之則君之召也固當度義而行度義而行乃所為敬君而不敢欺也入太廟每事問解已見上朋友死無所歸曰于我殯無所歸謂無親戚任之者則其責在朋友矣朋友之饋雖車馬非祭肉不拜朋友與已敵其通有無蓋常義也故其饋雖多可以無拜于祭肉則拜之重其先也寢不尸居不容寢不尸體不肆也居不容安舒而已非惰也一本云門人之察聖人其詳至于寢處之際無不盡者昔人之學固如此哉見齊衰者雖狎必變見冕者與瞽者雖褻必以貌狎謂與之習熟者褻謂見之頻數者凶服者式之式負版者此車中之容哀有喪重民數也有盛饌必變色而作不虛其禮意也迅雷風烈必變敬天之怒也升車必正立執綏此升車之節也一説引曲禮君出就車則僕併轡授綏綏所以總轡者也四馬兩驂凡六轡攬之為難故以綏總之然後便于執立不正則轡有掣縱故必正立而後六轡均調車中不內顧不疾言不親指三者非獨恐其惑衆也蓋以其非在車之容故耳夫道不可須臾離可離非道是無往而不為道也聖人言語容貌衣服飲食至纎至悉之間無不盡其節非聖人之循之也聖人之德之盛固無非道之所存也在學者之進德則當以聖人為準的致精于事事物物之間謹其節而求所以勿失者焉故中庸曰禮儀三百威儀三千待其人而後行苟不至德至道不凝焉色斯舉矣翔而後集此非止為事君而言色斯舉矣炳先見于幾微也翔而後集從容審度而後處之也若是則悔吝何由而至乎曰山梁雌雉時哉時哉子路共之三嗅而作橫渠曰雌雉魯俗一時所貴仲尼傷薄俗易流所美非是仲由不達乃具羞以饋三嗅者示衆好之必察也不食者知所以美之非美也論語解卷五欽定四庫全書論語解卷六宋張栻撰先進篇子曰先進於禮樂野人也後進於禮樂君子也如用之則吾從先進野人君子由後人之稱也前人於禮樂務其質而於文有所未足後人則習其文而日盛矣惟其文之盛故以前輩為野人而自謂為君子文勝而過質則於禮樂之實反有害故聖人思反本而有從先進之言程子曰若用於時救文之弊則吾從先進小過之義也今也純儉吾從衆奢則不遜儉則固與其不遜也寧固此之謂也或曰然則從周之説奈何蓋文莫備於周大體固當從周而其末流文勝之弊則不可以不正也從先進與從周固各有義耳子曰從我於陳蔡者皆不及門也德行顔淵閔子騫冉伯牛仲弓言語宰我子貢政事冉有季路文學子遊子夏從夫子於陳蔡者自顔淵而下當時偶不在門故夫子思其時人才之盛而稱之所謂言語政事文學皆由一道入而有所自得者至於德行則默而成之以造其全蓋不可以一事名也彼三者未免利仁之事進乎德行者則安仁之事也子曰回也非助我者也於吾言無所不説常人聞夫子之言不能疑而問與問而不當固無所助也學者則有助矣疑而問問而益得以發其精微若子夏之起豫是也謂顔子非助我者以其於吾言無所不説蓋回聞夫子之言無不得於其心而無疑之可復故也子曰孝哉閔子騫人不間於其父母昆弟之言間與禹吾無間然之間同凡有所未盡則有間而可言處之盡其道人無得而間然也南容三復白圭孔子以其兄之子妻之三復白圭之章其感於中者深矣謹言如此則謹行可知言者人之所易故也季康子問弟子孰為好學孔子對曰有顔回者好學不幸短命死矣今也則亡必若顔子而後謂之好學他人皆不得與焉則聖門問學之方蓋可知矣顔淵死顔路請子之車以為之椁子曰才不才亦各言其子也鯉也死有棺而無椁吾不徒行以為之椁以吾從大夫之後不可徒行也聖人正大之情天地之情也才不才亦各言其子謂才與不才雖異而彼此均為其子也鯉雖不可以並淵然在已則子也無椁則亦已矣淵雖賢而父之葬子也亦稱家之有無而已又何必強為之椁乎夫子視淵固猶子也不得舍車於鯉則亦不得舍車於淵矣顔淵死子曰噫天喪豫天喪豫顔淵死子哭之慟從者曰子慟矣曰有慟乎非夫人之為慟而誰為謂天之喪已者以顔淵之死而卜天意懼斯道之不傳也哭之慟而從者曰子慟矣門人恐聖人哀之過也聖人有過乎情之至而不自知其慟故曰有慟乎然謂非夫人而誰為則其節固在乎其中矣顔淵死門人欲厚葬之子曰不可門人厚葬之子曰回也視豫猶父也豫不得視猶子也非我也夫二三子也葬以禮者謂得其理也顔子簞食瓢飲居於陋巷及其死門人乃欲厚葬之則失其理矣夫子止之而不可得謂回雖視豫猶父而已不得視之猶子以有顔路故也其曰非我也夫二三子也其誠於幽明之際如此顔子之在聖門門人莫先焉故於其喪也門人記夫子之所以處之者甚詳所謂仁之至而義之盡者也季路問事鬼神子曰未能事人焉能事鬼敢問死曰未知生焉知死人以鬼神與死為異事而不知其為常也蓋不越於理而已由聚散故有死生由幽明故有人鬼能事人則能事鬼矣知生則知死矣事人者事君事親事長之類是也知生者知所以生也然則所謂事鬼神之理與死之理豈外是乎哉故君子之於學務於其近而已而其逺者莫之能違也若異端則以鬼神與死别為一説驚怪恍惚而其失莫之窮也閔子侍側誾誾如也子路行行如也冉有子貢侃侃如也子樂若由也不得其死然一於篤敬故誾誾進於和樂故侃侃直而果故行行有諸中形於外莫掩也故夫子樂其實焉若由也不得其死然謂如由之氣象蓋有不得其死之理此為疑之之辭而因以警之也孔悝被劫子路死之誠不可以不死謂之不得其死不可也然其從孔悝則有為之死之理始擇之未善也則不幾於不得其死乎若比干則可謂得其死者矣然則求生以害仁者謂之不得其生可也子路雖不得其死而與是類固不可同日而語矣魯人為長府閔子騫曰仍舊貫如之何何必改作子曰夫人不言言必有中先儒謂長府為藏貨財之府貨財之府無故而改為得無示人以崇利聚斂之意乎故閔子以為當仍舊貫而不必改也言必有中者中於理也子曰由之瑟奚為於丘之門門人不敬子路子曰由也升堂矣未入於室也以瑟為言者蓋瑟之聲音象其中之所存也子路之氣稟偏於剛雖其學之有至氣質不為不變然於其所偏終有化之未能盡者在聖人之門為有未和也斯言所以警子路而進之而門人聞此遂有不敬子路之意蓋未知子路之所至與夫聖人發言之意也故復從而開曉之夫自得其門而入以至於升堂其為次序淺深亦已多矣其於用力亦可謂至矣獨未及夫閫奧之地耳由室而言在堂者則為未至所當勉以進也由宫牆之外而望其升堂者則不亦有間乎聖人斯言非特以發明子路亦所以使門人知學之有序也子貢問師與商也孰賢子曰師也過商也不及曰然則師愈與子曰過猶不及子張髙明故常開擴子夏敦篤故常收斂開擴則未免於有過收斂則未免於有不及然二子之過不及甚微特未得其中而已夫子謂過猶不及過與不及為未得其中則均也今以論語所載二子之言行觀之其所過與不及者蓋亦可得而見矣季氏富於周公而求也為之聚斂而附益之子曰非吾徒也小子鳴鼓而攻之可也此哀公十年用田賦之事也冉有時為季氏宰考之國語蓋嘗以此事訪於夫子而卒莫之救以冉有為宰之時而季氏之賦倍他日此夫子所以有聚斂附益之歎而孟子又發無能改於其德之論也冉有既為季氏之臣所當救正其非使之由於法度今既不能正而又順其所為私門益以封殖則公室益以衰弱此求之所以得罪於聖門為深也原求所以至此蓋不能如閔子見幾而作因循陵遲而不自知也有志於學者亦鑒諸柴也愚參也魯師也辟由也唁愚則専而有所不通魯則質而有所不敏辟則文煩唁則氣俗此皆其氣稟之偏夫子言之使之因其所偏矯厲而擴充也然曽子之魯其為學篤實故卒能深造於道非唯質不足以病之而適所以成之也子曰回也其庶乎屢空賜不受命而貨殖焉億則屢中顔子之庶幾於聖人以其屢空也空者意必固我不留於中也然猶曰屢焉特未若聖人之純焉耳聖人則絶四矣顔子不二過有不善未嘗不知知之未嘗復行者也賜不受命而貨殖賜之貨殖亦豈如他人哉特未免有意於豐約之間耳此則於天命之自然者為不能受其正而其聰明所及億度而多中焉以其資稟之髙故也然億而屢中則不能以皆中也苟惟天理之安則不待於億而無往不中矣聖門惟子貢聰明亞於顔子故聖人嘗問以與回孰愈而於兹又發此義所以進之者逺矣程子曰此亦子貢始時事耳其晚歲所進蓋不可以是論也子張問善人之道子曰不踐迹亦不入於室程子曰所謂善人者不為不善也故不必踐舊迹而已有不善則能改之矣雖然亦不能造道之逺奧也苟能之則賢逺也不止為善人而已或曰善人者未能有諸已乎曰不能有之則安得善然所謂有諸已者蓋亦有淺深故善人謂其不能有諸已則不可然謂其盡夫有諸已之道則亦未也子曰論篤是與君子者乎色莊者乎惟其言之篤厚是與當與其君子者乎與其色莊者乎君子謂行稱其言者色莊謂行違於言居之不疑者此言取人當聽言而觀行也子路問聞斯行諸子曰有父兄在如之何其聞斯行之冉有問聞斯行諸子曰聞斯行之公西華曰由也問聞斯行諸子曰有父兄在求也問聞斯行諸子曰聞斯行之赤也惑敢問子曰求也退故進之由也兼人故退之聞義固當勇於為然有父兄在則亦有不可得而専為者若不稟命而行則反傷於義子路有聞未之能行惟恐有聞其勇蓋如此於所當為不患其不能為也特患為之之意或過焉而於其當稟命而行者有所闕焉耳若冉求之資稟失之弱不患其不稟命也患其於所當為者逡巡畏縮而為之不力耳聖人一進之一退之所以約之於義理之中而使無過不及之患其成德逹才之道可謂至矣子畏於匡顔淵後子曰吾以女為死矣曰子在回何敢死夫子以顔子之後而憂其或不免若顔子之言之意則謂夫子免於難則已亦何敢果於死聖人微服而過宋為死之傷勇故耳則顔子亦烏得果於死哉然或不幸而不得免焉則亦有之矣季子然問仲由冉求可謂大臣與子曰吾以子為異之問曽由與求之問所謂大臣者以道事君不可則止今由與求也可謂具臣矣曰然則從之者與子曰弒父與君亦不從也季子然樂由求之從已而稱之為大臣故夫子小之而為之言大臣以道事君之事道謂正理不可謂不合於正理也有不合於正理則為大臣者必從而止之由求為季氏之臣坐觀其失而不之止是不以道事君也直尸祿備數而已故曰具臣然則從之者與季子以其不能止則當無不從也方是時季氏無君之心已著矣謂弒父與君亦不從者非惟言由求所長抑可以使之聞而懼也或曰弒父與君亦不從何必由求而能之曽不知順從之臣其始也惟利害之是徇而已履霜堅冰之不戒馴至蹉跌以至於從人弒父與君者蓋多矣如荀彧劉穆之之徒其始從曹操劉裕之時亦豈遂欲弒父與君哉惟其漸浸順長而勢卒至此耳雖然自弒父與君以下苟一事不以道而苟從之皆為失大臣事君之義如由求未免乎是也至如他人之因循以陷於大惡則由求不至乎是也然在聖門固亦不免於具臣之譏矣子路使子羔為費宰子曰賊夫人之子子路曰有民人焉有社稷焉何必讀書然後為學子曰是故惡夫佞者子羔學未充而遽使為宰其本不立而置之事物酬酢之地將反戕賊其心矣故夫子有賊夫人子之歎夫民人社稷固無非學而學固不獨在於書籍之間然學必貴於讀書者以夫多識前言往行古之人所以畜德者實有賴乎是德立於已而後可以言無適而非學也至於上聖生知之流冝莫待乎讀書矣而夫子每以好古為言蓋聖雖生知而亦必由是以成之也如子路之言將使學者以聰明為可恃而無復敦篤濳泳之功其甚至於廢古而任意為弊有不可勝言者原子路發是言特禦人以口給耳而不知其失之若此也故夫子曰是故惡夫佞者所以責之之深也子路曽晳冉有公西華侍坐子曰以吾一日長乎爾毋吾以也居則曰不吾知也如或知爾則何以哉子路率爾而對曰千乘之國攝乎大國之間加之以師旅因之以飢饉由也為之比及三年可使有勇且知方也夫子哂之求爾何如對曰方六七十如五六十求也為之比及三年可使足民如其禮樂以俟君子赤爾何如對曰非曰能之願學焉宗廟之事如會同端章甫願為小相焉點爾何如鼓瑟希鏗爾舍瑟而作對曰異乎三子者之撰子曰何傷乎亦各言其志也曰莫春者春服既成冠者五六人童子六七人浴乎沂風乎舞雩詠而歸夫子喟然歎曰吾與點也三子者出曽晳後曽晳曰夫三子者之言何如子曰亦各言其志也已矣曰夫子何哂由也曰為國以禮其言不讓是故哂之惟求則非邦也與安見方六七十如五六十而非邦也者惟赤則非邦也與宗廟會同非諸侯而何赤也為之小孰能為之大聖人因四子侍坐之際從容以問之將使之深省且有發也三子之對皆非偶然而為是言所謂可使有勇且知方者蓋有勇而無義則亂勇而知方教之所行也所謂可使足民者使百姓均平無不足之患也言三年而可使如此其先後條貫素定於胸中而知其然也所謂願為小相者習乎先王禮文之事也三子者自體察其力之所至此皆言其實也向使用力不素驟聞聖人之問非茫乎無所措則泛然肆其説矣至於曽晳則又異乎是其鼓瑟舍瑟之間門人記之如此之詳者蓋已可見從容不迫之意矣言莫春之時與數子者浴乎沂水之上風涼於舞雩之下吟咏而歸蓋其中心和樂無所係纍油然欲與萬物俱得其所玩味辭氣溫乎如春陽之無不被也故程子以為此即是堯舜氣象而亦夫子老者安之朋友信之少者懷之之意也晳之志若此自非其見道之明涵泳有素其能然乎然而未免於行有不掩焉則以其於顔氏工夫有所未能盡耳夫子以三子之言之實也故曰亦各言其志也已矣禮者為國之理也言之不讓則為廢禮而失所以為國之理矣如求與赤則庶幾乎能讓者故復因以稱之顔淵篇顔淵問仁子曰克己復禮為仁一日克己復禮天下歸仁焉為仁由己而由人乎哉顔淵曰請問其目子曰非禮勿視非禮勿聽非禮勿言非禮勿動顔淵曰回雖不敏請事斯語矣克盡己私一由於禮斯為仁矣禮者天則之不可踰者也本乎篤敬而發見於三千三百之目者皆禮也曰一日克己復禮者此言克己之至也天下歸仁者無一物之不體無一事之不該也為仁由己而由人乎哉言為仁在己用功非他人所得而與也非禮勿視非禮勿聽非禮勿言非禮勿動克己之目也勿者禁止之辭用力之要也不言思者程子四針所謂由乎中而應乎外制於外所以養其中也或曰克己之功自始學至於成德皆所當從事乎曰然始學者當隨事自克覺其為非禮則克之克之力則所見漸深所見深則其克也益有所施矣及其至也苟有一毫人為皆為非禮克之之功猶在所施至於大而化之則成乎天而後無所用夫克矣夫以顔子聞夫子之言宜其默識心通而方且問克己之目而請事斯語此顔子之學聖人所以為有始有卒也學者果欲從事於聖門則可不以顔子為準的哉仲弓問仁子曰出門如見大賔使民如承大祭已所不欲勿施於人在邦無怨在家無怨仲弓曰雍雖不敏請事斯語矣出門如見大賔使民如承大祭蓋平日之涵養一於敬故其出門使民之際皆是心也已所不欲勿施於人強恕者為仁之方也凡人有欲而不得則怨若夫平易公正欲不存焉則已無所怨於人和平之效人亦何所怨於已哉故曰在邦無怨在家無怨司馬牛問仁子曰仁者其言也訒曰其言也訒斯謂之仁矣乎子曰為之難言之得無訒乎人之易其言者以其未知用力也用力愈深則其言也愈不敢易矣故仁者之言必訒以其為之之難也司馬牛蓋易其言者故夫子以此告之使之深省乎用力之難而勉之也觀牛聞夫子之言而遽曰斯謂之仁矣乎則牛之易其言可知矣司馬牛問君子子曰君子不憂不懼曰不憂不懼斯謂之君子已乎子曰內省不疚夫何憂何懼司馬牛蓋多憂者故因其問君子而以不憂不懼告之不憂不懼固足以盡君子之道也若牛之意則以為漠然忘其憂懼而已疑以為未足以言君子也不知聖人之所謂不憂不懼者以夫內自省察無所愧病故得其樂而物莫之嬰也能進於是非君子乎曽子之守約蓋此也使司馬牛而知所從事則勉之於己而已不然徒膠擾於憂懼之域而何益乎司馬牛憂曰人皆有兄弟我獨亡子夏曰商聞之矣死生有命富貴在天君子敬而無失與人恭而有禮四海之內皆兄弟也君子何患乎無兄弟也牛之兄弟司馬魋也牛以其為惡不能以自保也故有孤立而亡兄弟之憂若子夏之意則以在外者不可以強求而在已者可得而修勉故知死生之有命則當受其正而已知富貴之在天則當行吾義而已張子曰論死生則曰有命以言其氣也語富貴則曰在天以言其理也夫死生則有命富貴則在天君子夫何為乎以敬而無失為主其接人則恭而有禮而已敬而無失在已居敬而不違也恭而有禮待人恭遜而中節也此乃人道正理以行於世而人自樂親之四海之內何莫而非兄弟是則何孤立之憂乎易所謂顯比者是其義也子張問明子曰浸潤之譛膚受之訴不行焉可謂明也已矣浸潤之譛膚受之訴不行焉可謂逺也已矣吕氏曰譛者毁人之行訴者訴已之私浸潤者漸進而已內有所未入膚受者面從而已心有所未然明者知幾逺者慮終必拒其始然後譛訴不得行不然則始雖漸進久則言入始雖面從久則心然兹説備矣子貢問政子曰足食足兵民信之矣子貢曰必不得已而去於斯三者何先曰去兵子貢曰必不得已而去於斯二者何先曰去食自古皆有死民無信不立生則有死人之常理至於無信則欺詐傾奪無復人理是重於死也夫食與兵固為急務然信為之本無信則雖有粟而誰與食雖有兵而誰與用哉棘子成曰君子質而已矣何以文為子貢曰惜乎夫子之説君子也駟不及舌文猶質也質猶文也虎豹之鞟猶犬羊之鞟文猶質質猶文言文質相似俱不可無也虎豹之鞟猶犬羊之鞟言苟文可去則虎豹之鞟與犬羊之鞟何異此可見文質之俱不可無也夫有其質則有其文質者文之本而文者所以成其質也質立矣而文生焉體用兼備表裏兼資君子所以為彬彬也哀公問於有若曰年飢用不足如之何有若對曰盍徹乎曰二吾猶不足如之何其徹也對曰百姓足君孰與不足百姓不足君孰與足哀公以用不足為憂而有若之對循其本以告之夫徹者周家什一之法徹法行而百姓無不足之患百姓足則國斯強固而君以安榮亦無不足之憂矣儒者謀人之國未有不循其本而言之也使哀公思夫二之猶不足而有若乃欲損之以為足國之道在乎是則庶乎知為政所當損益者矣子張問崇德辨惑子曰主忠信徙義崇德也愛之欲其生惡之欲其死既欲其生又欲其死是惑也誠不以富亦祗以異崇德辨惑修身切要之務也以忠信為主而見義則徙焉則本立而日新德之所以崇也不主忠信則無徙義之實不能徙義則其所主亦有時而失其理二者蓋相須也人之生死有命豈容我欲之乎以愛惡之私情而欲人之生死其為惑也不亦甚乎推此一端則凡欲之而妄者皆惑也引詩為證言此其誠實之不富祗以自取異云耳齊景公問政於孔子孔子對曰君君臣臣父父子子公曰善哉信如君不君臣不臣父不父子不子雖有粟吾得而食諸為政以敘彛倫為先彛倫不敘則節目雖繁亦無以順治矣君君臣臣父父子子此彞倫所為敘也雖堯舜之治亦不越乎此貴於盡其道而已楊氏曰景公雖知斯言之善而不能反求其所以然所謂説而不繹也子曰片言可以折獄者其由也與子路無宿諾聽獄之辭以片言決其是非而人無不順聽者則以其平日之履行有以信於人故也記語者復載其無宿諾之事古注訓宿為預尹氏曰不預諾所以全其信也蓋推此一端則可見季路平日所以自盡者冝其有以信於人也子曰聽訟吾猶人也必也使無訟乎聖人之意不以聽訟為能而以無訟為貴也夫人之所以至於爭訟者必有所由而然於其本而正之則訟可亡也故教之以孝愛而悖慢之訟亡矣教之以禮遜而傾奪之訟亡矣以至於均田有制民得其養而田野之訟何自而興昏姻以禮不失其時而昏姻之訟何自而興凡此皆使之無訟之道也况於在聖人立之斯立道之斯行綏之斯來動之斯和有同於化育之功者乎記語者載此以承上章則有以見仲由之道為未𢎞也子張問政子曰居之無倦行之以忠以子張之難能其於為政之方不患其不能知而行也所患者誠意不篤有時而或倦徇於其外有時而不實耳居之無倦則誠存於己行之以忠則實周於事充之則聖人之所以為政者亦無越乎此也子曰博學於文約之以禮亦可以弗畔矣夫解見前子曰君子成人之美不成人之惡小人反是君子充其忠愛之心於人之美其樂之如在已也從而扶持之又從而勸長之惟欲其美之成也於人之惡則從而正救之正救之不可則哀矜之惟患其惡之成也若小人則以刻薄為心幸人之有過而疾人之勝已則非徒坐視其入於惡又從而擠之非徒欲其美之不成又從而毁之君子小人之所操存未嘗不相反也季康子問政於孔子孔子對曰政者正也子帥以正孰敢不正為政之本正已為先帥以正則無敢不正者蓋已正而後教之則人樂從之不然雖刑罰日施亦莫之禁矣季康子患盜問於孔子孔子對曰苟子之不欲雖賞之不竊橫渠張子曰假設以子不欲之物賞子使竊子必不竊故為政者先乎足民使民無所不足則不見可欲而盜心息矣蓋盜生於欲之不足使之足乎此則不欲乎彼此古人弭盜之原也季康子問政於孔子曰如殺無道以就有道何如孔子對曰子為政焉用殺子欲善而民善矣君子之德風小人之德草草上之風必偃在上者志存於殺則固已失長人之本矣民亦將以不肖之心應之又焉能禁止其惡乎欲善者欲民之善也所謂以人治人也是心純篤發見於政教之間民將率從丕變如風之所動其孰有不從者然則民之所以未之從者則吾欲善之誠不篤而已子張問士何如斯可謂之逹矣子曰何哉爾所謂達者子張對曰在邦必聞在家必聞子曰是聞也非達也夫達也者質直而好義察言而觀色慮以下人在邦必達在家必達夫聞也者色取仁而行違居之不疑在邦必聞在家必聞聞與達異聞謂人知之達謂道行於家邦也若有求聞之意則其心外馳矣烏能達乎以質直為尚而好義則能實進於善矣察言而觀色則酬酢之方進退之冝皆有以審處矣慮以下人則能自克其驕矜之意矣若是則處已處人皆得其道其何往而不可行乎固不問夫人之知與不知也色取仁而行違者其色若有取於仁而中心不然若是者雖欲以竊取一時之譽而自心以及家邦豈復有可行之實哉樊遲從遊於舞雩之下曰敢問崇德修慝辨惑子曰善哉問先事後得非崇德與攻其惡無攻人之惡非修慝與一朝之忿忘其身以及其親非惑與樊遲於夫子從容於舞雩之時而有問焉所謂崇德修慝辨惑者亦可謂之切問矣故夫子善之先事後得先其所事而不計其得此德所以崇也若先有求得之心反傷於德矣攻己之惡而不暇攻人此慝所以修也若專意於攻人之惡則其心先有害而於已亦莫之省矣忿之不忍至於忘身以及親此惑之大者也是可不謹於微而懲其源乎此三者皆修身之要務斯須之不可忘者也樊遲問仁子曰愛人問知子曰知人樊遲未逹子曰舉直錯諸枉能使枉者直樊遲退見子夏曰鄉也吾見於夫子而問知子曰舉直錯諸枉能使枉者直何謂也子夏曰富哉言乎舜有天下選於衆舉臯陶不仁者逺矣湯有天下選於衆舉伊尹不仁者逺矣原人之性其愛之理乃仁也知之理乃知也仁者視萬物猶一體而况人與我同類乎故仁者必愛人然則愛人果可以盡仁乎以愛人為可以盡仁則未可而其所以愛人者乃仁之所存也至於問知而喻以知人者亦猶是耳樊遲未達疑其未可以盡也夫子復告之以舉直錯諸枉能使枉者直言知人之功用如此遲猶有疑焉而訪之子夏觀遲之在孔門雖資稟之鈍然亦務實者故凡遲之所疑者在他人則亦忽而不之疑也其於師友之際問辨之不置如此子夏聞夫子之言而富之舉舜湯之事以擴其心於此蓋可見知人之為大矣子貢問友子曰忠告而善道之不可則止毋自辱焉忠告者有不善則告之而無隱也善道者以善誘掖之也斯二者亦足以盡友道矣苟其不以為可則止焉蓋友以義合者也故不可則有止之義若強聒焉非徒無益反以自辱傷友道矣曽子曰君子以文會友以友輔仁朋友講習與夫攝以威儀莫非文也為仁固由已而亦資朋友輔成之輔云者左右翼助之意蓋非惟切磋之益其從容浹洽相觀而善所輔為多論語解卷六欽定四庫全書論語解卷七宋張栻撰子路篇子路問政子曰先之勞之請益曰無倦身率之於前而勸相之於後充此固足以盡為政始終之道矣而子路猶請益焉則告之以無倦使之敦篤乎是二者而已仲弓為季氏宰問政子曰先有司赦小過舉賢才曰焉知賢才而舉之曰舉爾所知爾所不知人其舍諸先有司則事有所任赦小過則人得展其才舉賢才則可以成治而善俗為政亦不越是三者之為要矣人才誠未易知也故仲弓有焉知賢才而舉之之問舉爾所知爾所不知人其舍諸此立賢無方之公心也然則又奚患賢才之不聞哉子路曰衛君待子而為政子將奚先子曰必也正名乎子路曰有是哉子之迂也奚其正子曰野哉由也君子於其所不知蓋闕如也名不正則言不順言不順則事不成事不成則禮樂不興禮樂不興則刑罰不中刑罰不中則民無所措手足故君子名之必可言也言之必可行也君子於其言無所苟而已矣此雖為衛國而發實為天下國家之要也正名之道莫先於人倫之際當時衛國自其人倫蓋已不正矣故夫子首以為言以子路之賢而以為迂迂謂其難行也聖人以為野者以其不闕其所不知也於是為之言正名之道天尊地卑乾坤定矣凡在天地間洪纎髙下是非美惡有其物有其事則有其名蓋理之所定也名之不正則洪纎髙下失其倫是非美惡紊其宜言之斯不順矣言之不順則咈於人心而人莫之服事之所以不成也事不成則失其序而不和禮樂之所以不興也禮樂不興則必至於從事於刑罰以強人之從已則刑罰不中而民無所措其手足矣名之不正其弊蓋至此若夫君子則其名必可言其言必可行言未嘗有所苟以其正名為先故耳樊遲請學稼子曰吾不如老農請學為圃曰吾不如老圃樊遲出子曰小人哉樊須也上好禮則民莫敢不敬上好義則民莫敢不服上好信則民莫敢不用情夫如是則四方之民襁負其子而至矣焉用稼樊遲請學稼圃之意以為在上者當厪力以先民也夫子答以不如老農老圃謂非君子所當事者也樊遲既出而復申言之者遲無以復而義有未盡也小人云者為其所見者小人之事也孟子所謂有大人之事有小人之事正本此意夫上之所好下之所從也而有弗從者好之未至焉耳上好禮則篤於恭讓故民視之而莫不尊敬焉上好義則動而得其宜故民心為之厭服焉上好信則誠意下孚故民亦用其情而無敢欺焉感應之機固不逺也是非徒有以得其國之民四方之人莫不願為之氓矣區區欲下從農圃之事以得民者其亦小矣子曰誦詩三百授之以政不逹使於四方不能專對雖多亦奚以為人情事理皆具於三百篇之中故誦之而可以達政三百篇皆易其心而後語得其所以言者也故誦之而可以專對若誦詩矣而於此二者無得焉則是誦言而忘味者也子曰其身正不令而行其身不正雖令不從從違之本不係於令係於所以示之者何如耳子曰魯衛之政兄弟也魯衛之先固兄弟也而方春秋之時二國之政陵夷亦無以異也故聖人歎息焉子謂衛公子荆善居室始有曰苟合矣少有曰苟完矣富有曰苟美矣公子荆無求富之心於其合也完也美也而皆曰苟焉則其欲不競於物可知矣此所以為善居室子適衛冉有僕子曰庶矣哉冉有曰既庶矣又何加焉曰富之曰既富矣又何加焉曰教之庶矣則當富之富矣則當教之聖賢仁民之意無窮而施之為有序也冉有亦可謂善問矣子曰苟有用我者期月而已可也三年有成期月而大綱立三年而治功成然三年之所成者即其期月所立之規摹者也充之而已矣子曰善人為邦百年亦可以勝殘去殺矣誠哉是言也善人相繼百年之間其教化之所及亦可使民不由於惡若夫進乎此則其風化固不止於此也故繼之以王者必世而後仁焉子曰如有王者必世而後仁使民皆由於仁非仁心涵養之深仁政薰陶之久莫能然也此則非善人之所及矣子曰苟正其身矣於從政乎何有不能正其身如正人何聖賢之論為政未有不本於正身者也正其身矣則其推於有政亦是理而已身且不能正其於正人若之何哉後世之治未有能使人心悅誠服者以此也冉子退朝子曰何晏也對曰有政子曰其事也如有政雖不吾以吾其與聞之事止於一事而已若政則綱紀存焉政雖有但為一事者而其所該固非止乎是事而已也季氏之所為冉子之所得與者事耳苟有意於政則豈有不咨於孔子者乎冉子以事為政聖人辨之亦因以警之也定公問一言而可以興邦有諸孔子對曰言不可以若是其幾也人之言曰為君難為臣不易如知為君之難也不幾乎一言而興邦乎曰一言而喪邦有諸孔子對曰言不可以若是其幾也人之言曰豫無樂乎為君惟其言而莫豫違也如其善而莫之違也不亦善乎如不善而莫之違也不幾乎一言而喪邦乎此二言者興喪之端實分焉蓋知夫為君之難則必思所以自勉者而其易將至矣惟樂其從而不察其不善則讒諂靣諛之人至與之俱淪亡而後止矣聖人之言含蓄而無弊故問一言可以興喪則以為言不可以若是而舉其幾者焉幾近也既曰為君難為臣不易必曰如知為君之難而後以為幾焉既曰惟其言而莫豫違必曰如不善而莫之違也而後以為幾焉亦可見立言之密矣葉公問政子曰近者説遠者來近者樂其澤遠者慕其風此政之善也然未有澤不及於近而能使人慕之者也子夏為莒父宰問政子曰無欲速無見小利欲速則不達見小利則大事不成欲速則期於成而所為者必苟故反以不達見小利則徇目前而忘久遠之謀故反以害大事不欲速不見小利平心易氣正義明紀為其可繼而已矣以子夏之規模夫子恐其小成也故以此告之葉公語孔子曰吾黨有直躬者其父攘羊而子證之孔子曰吾黨之直者異於是父為子隱子為父隱直在其中矣直者順其天性而不以人為害之者也父子之親性之理也其更相為隱是乃若其性之自然而非有所加於其間也若於所當隱而不之隱則是逆天性之理斯為不直矣世之循名而不究其實者其於君臣父子之際咈其所以為直之理幾何其不若是哉樊遲問仁子曰居處恭執事敬與人忠雖之夷狄不可棄也居處恭亦敬也端莊儼恪之謂執事敬當是事則主是事也與人忠無敢欺無敢慢也要須從事之久則下學上逹意味日深仁其在是矣雖之夷狄不可棄也以言其工夫不可間斷也子貢問曰何如斯可謂之士矣子曰行已有耻使於四方不辱君命可謂士矣曰敢問其次曰宗族稱孝焉鄉黨稱弟焉曰敢問其次曰言必信行必果硜硜然小人哉抑亦可以為次矣曰今之從政者何如子曰噫斗筲之人何足算也聖人三答子貢之問雖有淺深然皆篤實為已之事士之為士以實為貴也行已有恥不為不義也使於四方不辱君命周於用也宗族稱孝鄉黨稱弟雖未知其見於用何如然其孝弟之行已信於人也至於言必信行必果雖有未能合於義而亦區區庶幾期於自守者小人云者謂所見之小耳子貢初有疑於今之從政者於是而知夫子之意有在則又以為問焉程子曰志苟急於斗筲惟恐其不能暴見也蓋徇外而不務實則不可謂之士矣子曰不得中行而與之必也狂狷乎狂者進取狷者有所不為也中行謂中道上行者狂者所見髙明而行有未及乎其見狷者所守堅確而見有未得乎其理不得中行則斯二者亦可以與之進而裁之於中也蓋狂者力行以踐之則其見不差狷者致知以明之則其守不失而中可得矣子曰南人有言曰人而無恆不可以作巫醫善夫不恆其德或承之羞子曰不占而已矣巫醫專精於祭祀疾病之際非無恆者所可為也無恆者雖巫醫且不可為也聖人善斯言而引易之爻義謂不恆其德者必至於羞辱承之又斷之曰不占而已矣謂理之必然不待占決而可知也子曰君子和而不同小人同而不和和者和於理也同者同其私也和於理則不為苟同同其私則不能和義天理人欲不兩立也子貢問曰鄉人皆好之何如子曰未可也鄉人皆惡之何如子曰未可也不如鄉人之善者好之其不善者惡之鄉人皆好之皆惡之未可以其人為善也蓋鄉人有善惡則其好惡不容不異若皆好之恐未免於同乎流俗也若皆惡之恐未免於崖異絶世也故不若鄉人之善者好之其不善者惡之則其為善誠善矣子曰君子易事而難説也説之不以道不説也及其使人也器之小人難事而易説也説之雖不以道説也及其使人也求備焉易事者平恕之心也難説者正大之情也其所説者義理而已非説人之説已也故説之不以道則不説與人為善而取人不求備故使人則器之小人則徇於一已之私而已故順已則喜而不察其非道也勝已則忌而惟欲責其全也此公私之分也子曰君子泰而不驕小人驕而不泰泰者心廣而體胖驕者意盈而氣盛也驕則何由泰泰則奚驕之有然而能不驕矣而未之泰者則亦有之蓋雖能制其私而涵飬未至未免乎拘迫者也子曰剛毅木訥近仁剛毅木訥言其質也剛則所執者強毅則其行必果木者質朴訥者澀鈍反是其去仁遠矣雖然有剛毅木訥之質亦從事於學而後可以至於仁不然其質雖近仁而亦莫由進也一本云計較作為害仁為甚故以剛毅木訥之質為近仁焉子路問曰何如斯可謂之士矣子曰切切偲偲怡怡如也可謂士矣朋友切切偲偲兄弟怡怡切切善道相磨之意偲偲思慮相成之意朋友之間不越是二端而已至於兄弟則特可言怡怡焉以怡怡為主而所謂長善救失者蓋亦在怡怡之中矣若有害於怡怡則為先失所以處兄弟之道矣而餘何言乎以子路之剛果故告之以此子曰善人教民七年亦可以即戎矣以善人而教民至於七年之久而猶曰亦可以即戎言兵之不易也如此然所謂即戎者如易利用行師利用侵伐之類子曰以不教民戰是謂棄之所謂教者教之以君臣父子長幼之義使皆有親其上死其長之心而又教之以節制如司馬法是也若未之教而驅之戰則是棄之死地而已矣憲問篇憲問耻子曰邦有道榖邦無道榖恥也邦有道而祿食理之順且常也若無道之世退而處約乃其常耳而可榮以祿焉則必枉其道為可恥也克伐怨欲不行焉可以為仁矣子曰可以為難矣仁則吾不知也克伐怨欲不行亦可謂能制其私欲者矣然克伐怨欲之根猶在也若夫仁者之心則克伐怨欲無自而萌焉故制之於流未若澄之於源也欲進於是其惟克已乎子曰士而懷居不足以為士矣懷居者志不立其何以為士乎子曰邦有道危言危行邦無道危行言孫危者髙特之意君子非故欲危其言行也介然守道不徇於世自世人視之見其髙且特耳行有一定之操故不以世之有道無道而改若夫言則可孫矣孫言所以辟禍也其孫也亦豈枉其理哉特含蓄而不敢盡耳尹氏曰為國者使士言孫不亦殆哉子曰有德者必有言有言者不必有德仁者必有勇勇者不必有仁有德者必有言其有言也和順積中而發見自然也仁者必有勇其有勇也其惻怛之中誠形於外也固有務於言實未至者矣故有言者不必有德固有勇於為而未必中於道者矣故有勇者不必有仁是以君子惟德之務而言非所先也惟仁是求而勇非所病也南宫適問於孔子曰羿善射奡蕩舟俱不得其死然禹稷躬稼而有天下夫子不答南宫適出子曰君子哉若人尚德哉若人方是時天下以力相髙而不知貴德南宫適之言謂強力不可恃而德之為尊也夫子不答者以其有禹稷之言答之則是已當之也而以其言之善則從而美之使學者知尚德之意也言禹稷之德而獨稱其躬稼者舉其見於行事之實也南宫適亦知言哉子曰君子而不仁者有矣夫未有小人而仁者也斯須之間心不在焉則為不仁是故君子戰兢自持而惟恐失之也若小人則戕賊陷溺者之深雖秉彝之端不容盡殄而不能以自達也子曰愛之能勿勞乎忠焉能勿誨乎愛之斯勞之矣忠焉斯誨之矣勞者勸其善以長之也誨者語其失以救之也君子之於人也忠愛之情篤故長善救失之意無窮已焉子曰為命裨諶草創之世叔討論之行人子羽修飾之東里子産潤色之鄭小國也介於大國之間其所以能自保者亦以辭命之善而其辭命之善則以夫衆賢之力耳草創者具其大綱也討論者考之古驗之今而詳訂之也修飾者善其辭氣也至於潤色之際則命幾於成矣必經子産之手點化之而後其精神氣象為備也聖人稱之以見為命猶當假衆賢之力則夫事有大於是者又可知矣雖然鄭獨其為命之善可以自保而已假使賢才有進於此而經理其國皆無憾如此則豈特僅自保而已乎凡此皆聖人言外之意也或問子産子曰惠人也問子西曰彼哉彼哉問管仲曰人也奪伯氏駢邑三百飯疏食沒齒無怨言子産之德惠為勝故獨以此目之彼哉彼哉謂其人之不足稱也人也云者古注云如詩所謂伊人當從此説蓋如曰之人也云爾舉其奪邑而人不怨則可見其為政之得宜也凡夫子之稱管仲皆舉事以言之聖人抑揚之意固亦可見子曰貧而無怨難富而無驕易富而無驕易不矜於外物者能之至於貧而無怨非內有所安者不能也或謂世固有處貧賤而無失至於一旦當富貴之地則失其本心然則難易之論有時而不然耶此蓋未知夫無怨之味也所謂處貧賤而無失者特未見其失於外耳又烏能保其中之無怨耶蓋一毫有所不平於其中皆為怨矣故貧而無諂易貧而無怨難無怨則進於樂矣子曰孟公綽為趙魏老則優不可以為滕薛大夫老者行義為人所尊之稱趙魏老在當時號為家事治者公綽之不欲其德可取也故以為趙魏老則優若夫滕薛則小國也大夫之職煩勞意者公綽之才有所不足故不可為耳大抵用人之方貴於處之得其當而已子路問成人子曰若臧武仲之知公綽之不欲卞莊子之勇冉求之藝文之以禮樂亦可以為成人矣曰今之成人者何必然見利思義見危授命久要不忘平生之言亦可以為成人矣兼四子之美而文之禮樂然後可以為成人蓋體不備不足以為成人故四子之美必兼得之雖兼之矣而不文之以禮樂則亦將失其序而不和故必文以禮樂而後可也文之以禮樂道問學之事也語成人之極致至於聖人之踐形而後為盡故此言亦可以為成人矣然而又言其次者聖人所以引而進之也見利思義無苟得也見危授命無苟避也久要不忘平生之言不食其言也是雖未有過人之才而亦敦篤忠信之人故在今日論之亦可以為成人此亦思狂狷之意耳子問公叔文子於公明賈曰信乎夫子不言不笑不取乎公明賈對曰以告者過也夫子時然後言人不厭其言樂然後笑人不厭其笑義然後取人不厭其取子曰其然豈其然乎公叔文子意者簡默重厚之士故人之稱之如此聖人質之於其門人將以察其然也公明賈之言則善矣然非公叔文子之所及也蓋如賈之所言非和順積中發而中節者莫能然不直謂不然而為之疑辭曰其然豈其然乎聖人辭氣含洪忠厚如此子曰臧武仲以防求為後於魯雖曰不要君吾不信也武仲出奔邾自邾如防使來告曰苟守先祀無廢二勳敢不辟邑於是魯立臧為焉尹氏曰據邑以請立非要君而何不知義者將以武仲之存先祀為賢也故夫子正之子曰晉文公譎而不正齊桓公正而不譎程子曰晉文公欲率諸侯以朝天子正也懼其不能故譎而行之召王以就焉人獨見其召王之非而不見其欲朝之本心是以譎而掩其正也齊桓本侵蔡遂至於楚而伐之責其職貢之不修其行非正然其所執之事正故稱其伐之正而不見其行事之本譎是以正而掩其譎也聖人發其心迹使晉人勤王之志顯且使後世知慎所舉而不失其正也雖然桓文皆未為盡善也聖人斯言使知夫立意雖正而用之之差則反害其本意又使人知夫所行雖正而本意發之未善者亦終不可掩也大抵始終一出於正表裏粹然而無疵乃為善耳子路曰桓公殺公子糾召忽死之管仲不死曰未仁乎子曰桓公九合諸侯不以兵車管仲之力也如其仁如其仁子貢曰管仲非仁者與桓公殺公子糾不能死又相之子曰管仲相桓公霸諸侯一匡天下民到於今受其賜微管仲吾其被髮左衽矣豈若匹夫匹婦之為諒也自經於溝瀆而莫之知也夫子所以稱管仲者皆仁之功也問其仁而獨稱仁之功則其淺深亦可知矣只為子路疑其未仁子貢疑其非仁故舉其功以告之若二子問管仲仁乎則所以告之者異矣聖人問答抑揚之意學者當深味之公叔文子之臣大夫僎與文子同升諸公子聞之曰可以為文矣志在上賢而不萌媢忌之心以斯一善其諡以文可也子言衛靈公之無道也康子曰夫如是奚而不喪孔子曰仲叔圉治賔客祝鮀治宗廟王孫賈治軍旅夫如是奚其喪以衛靈公之無道然所用得其才猶足以無喪雖然僅能維持使之勿喪而已若身正於上而用得其人則孰禦焉子曰其言之不怍則為之也難易其言者實必不至若聽其言而不怍則知其為之難也矣故古者言之不出恥躬之不逮而仁者之言必訒也陳成子弒簡公孔子沐浴而朝告於哀公曰陳恆弒其君請討之公曰告夫三子孔子曰以吾從大夫之後不敢不告也公曰告夫三子者之三子告不可孔子曰以吾從大夫之後不敢不告也春秋之時三綱淪九法斁至於弒父與君亦莫之禁也孔子因陳恆之事而正討賊之舉此天下之大幾也斯事一正亂臣賊子無所容迹三綱可整九法可序而天下之事可以次第而舉矣沐浴而朝敬其事以卜天意也而公使告夫三子者孔子豈不知三子之必不以為可哉然當是時孔子已去位而從大夫之後君使之告則不可以不告也雖然是殆天意而已矣程子曰使當時之説得行則將上告天子下告方伯請命於周率與國而討之東周其復興乎若如左氏所載以魯之半加齊之半之説則是以力而不以義也豈孔子之心哉子路問事君子曰勿欺也而犯之盡誠而不欺犯顔而納忠事君之義大要盡是矣然勿欺其本也勿欺矣則誠信充積一不得已有時而犯之則有以感動之若忠信有所不足於事君之道為未盡而徒以犯顔為事亦鮮味矣以子路之剛果不患其不能犯故告之以勿欺之為主焉子曰君子上達小人下逹達者達盡其事理也上達者反本天理也下達者趨末人欲也皆云達者如君子喻於義小人喻於利皆云喻也子曰古之學者為已今之學者為人學以成已也所謂成物者特成己之推而已故古之學者為己而已己立而為人之道固亦在其中矣若存為人之心則是徇於外而遺其本矣本既不立無以成身而又將何以及人乎一本云學以成己也古之學者為其所當然而已若為人而學其作輟皆以人而已豈所以為學哉蘧伯玉使人於孔子孔子與之坐而問焉曰夫子何為對曰夫子欲寡其過而未能也使者出子曰使乎使乎公明賈之稱文子其言雖美而實則失之伯玉之使其言雖謙而意義永事情稱也夫欲寡過而未能非篤於進德修業者莫知此味也則伯玉之賢可知矣而其使之才亦可知矣子曰不在其位不謀其政解已見上曾子曰君子思不出其位位非獨祿位之稱大而君臣父子微而一事一物之間當其時與其地所思有所止而無所越皆為不出其位也非有主乎其中者其能然乎子曰君子恥其言而過其行言過其行則為無實之言是可恥也恥言之過行則其篤行可知矣子曰君子道者三我無能焉仁者不憂知者不惑勇者不懼子貢曰夫子自道也君子之道不越是三者而已矣自學而言之則知知仁守勇決三者所當並進也自德而言之勇之成名有未及乎知而知之成名有未造乎仁也夫子言之而不居郁乎其忠厚而浩乎其無窮也子貢方人子曰賜也賢乎哉夫我則不暇擬議人之優劣非知者其能之乎故亦可謂之賢而曰夫我則不暇求之他人不若篤其在已也聖人抑揚之間所以長善救失者冝深味也子曰不患人之不已知患其不能也四端五典雖聖人不自以為能盡也而况於學者其不能之患何有極乎而何所願乎外也若有一毫患人不已知之心萌於中則其害甚矣子曰不逆詐不億不信抑亦先覺者是賢乎逆詐億不信者智術之用而先覺者誠信之存蓋誠信充積於內則人之情偽事之幾微自無得而逃如鑑明於此而妍醜莫隱也若先以逆與億加之則吾固已自墮於欺妄之域矣雖使有時而或中至於情偽之交幾微之會必不能以先覺是猶反鑑而索照也雖然固有不逆詐不億不信而不能先覺者則以夫天資雖美而誠身之未至也故必曰先覺之是賢此所以貴乎學也一本云孔注先覺人情者是寧能為賢乎此解文義順蓋人必欲以先覺為賢則未免於逆詐億不信而不知其在已者先陷於巧偽矣君子可逝也不可陷也可欺也不可罔也又何必以能逆億於先為賢乎曰抑亦先覺者是賢乎辭氣何其溫厚而含蓄也微生畝謂孔子曰丘何為是栖栖者與無乃為佞乎孔子曰非敢為佞也疾固也包注固謂疾世固陋此解是栖栖猶皇皇也佞口給也疾猶病也微生畝謂夫子皇皇歷説類夫尚口者夫子以為非敢為佞病夫世之固陋云爾病世之固陋而欲以啓告之則有所不得已焉者微生之流蓋未知聖人天地生物之心也子曰驥不稱其力稱其德也驥之得稱為其德不為其力也而况於君子豈不以尚德為貴乎苟無其德雖曰有才其得謂之君子乎或曰以德報怨何如子曰何以報德以直報怨以德報德以怨報怨固為刑戮之民然以德報怨亦私意耳蓋所謂怨者猶橫在胸中故也若君子之心則何怨之存以直答之而已直者蓋待人之常道順理之是非也以待人之常道待怨者則怨之不存可知矣然於有德者則不能以忘德之之意未嘗不存蓋亦非姑息之謂特周旋曲折之間每致其敦篤焉耳此忠厚之心也一本云怨有輕重若施於已之怨則犯而不校何報之有若君父兄弟交遊之怨則義有當報者於所不當報而不報於所當報而報皆順夫理之當然此所謂直也直則非動於血氣可知矣子曰莫我知也夫子貢曰何為其莫知子也子曰不怨天不尤人下學而上達知我者其天乎莫我知之歎所以發問者賜有問焉可謂達矣無所必於天故不怨無所期於人故不尤惟篤其在已者而已下學而上達是也下學上達謂下學人事而上達天理天理初不外乎人事也知我者其天乎所謂天者理而已聖人純乎天道故其發言自然如此公伯寮訴子路於季孫子服景伯以告曰夫子固有惑志於公伯寮吾力猶能肆諸市朝子曰道之將行也與命也道之將廢也與命也公伯寮其如命何莫之致而至者命也道之廢興有命公伯寮何所預於其間哉不曰已而直曰道之將行與廢方之孟子豫之不遇魯侯之論亦可以見聖賢氣象之兮矣子曰賢者辟世其次辟地其次辟色其次辟言辟世者超然逺舉不與世事接也如太公伯夷居海濵之時辟地不居亂邦也辟色禮貌衰則去之者也辟言言弗行則去之者也程子曰四者雖以大小次第言之然非有優劣也所遇不同耳子曰作者七人矣橫渠張子曰謂伏羲神農黃帝堯舜禹湯制法興王之道非有述於人者也子路宿於石門晨門曰奚自子路曰自孔氏曰是知其不可而為之者與聖人非不知道之不可行而皇皇於斯世者天地生物之心也晨門蓋賢者之隱於抱關擊柝知其不可為而遂已者也彼雖知世之不可以為而未知道之不可以已也然而玩其辭氣緩而不迫則其所養有過於荷蕢之果者與子擊磬於衛有荷蕢而過孔氏之門者曰有心哉擊磬乎既而曰鄙哉硜硜乎莫已知也斯已而已矣深則厲淺則揭子曰果哉末之難去聲矣荷蕢聞磬聲以有心量夫子然彼獨未知夫子之心也則以為區區然欲世之知而已故謂莫已知則可以已深則當厲淺則當揭人不已知則當已也果哉末之難矣謂其言之果而無得與之辨論矣難去聲如楚狂接輿則欲下而與之言荷蓧丈人則使子路反見之蓋察其辭氣恐或可告語故耳子張曰書云髙宗諒隂三年不言何謂也子曰何必髙宗古之人皆然君薨百官總巳以聽於冢宰三年子張疑人君之不可以三年不言也故有此問此特以利害論而未究夫事理之實也冢宰之職統百官均四海三年之間百官蓋總已以聽矣夫君敕五典以治天下而廢三年之達喪何以教民孝乎夫子謂古之人皆然蓋言此天下之常經古人之通道故耳子曰上好禮則民易使也上篤於禮則民興辭遜而順其長上故易使也子路問君子子曰修已以敬曰如斯而已乎曰修已以安人曰如斯而已乎曰修已以安百姓修巳以安百姓堯舜其猶病諸修已之道不越乎敬而已敬道之盡則所為修已者亦無不盡而所以安人安百姓者皆在其中矣蓋一於篤敬則其推之家以及於國以及於天下皆是理也極其至天地位焉萬物育焉兆民雖衆其有不得其所安者乎是則修已以敬一語理亦無不盡者子路疑其未足也則告之以修已以安人安人是已之所推而已又疑其未足也則告之以安百姓安百姓是安人之備者而已又曰堯舜其猶病諸欲子路之毋忽於斯也凡覆載之內堯舜固欲已之澤均被之也有未能焉是堯舜之所病也此修己以敬無窮意原壤夷俟子曰幼而不孫弟長而無述焉老而不死是為賊以杖叩其脛原壤放達自居而不由於禮考之檀弓於其母死升木而歌則可見其人矣其在莊周列禦寇之下乎聖人於其夷踞以俟叩其脛而數之以為幼而不率其幼長而無可稱述如是而老而不死亦賊於天理而已蓋幼者當孫弟是乃天理也於是而不率則無往而不為賊天理矣方是時原壤亦長矣而聖人自其幼不孫弟數之則見其弊之所自也意原壤是時猶可以告故叩脛而告之是亦教者之一術也一本云聖人之教人必使之自幼而習於小學之事蓋孫弟乃學之本也闕黨童子將命或問之曰益者與子曰吾見其居於位也見其與先生並行也非求益者也欲速成者也闕黨童子意者其將命有若成人故或人疑其為求益者也夫子之意以為童子當為童子之事而已童子坐則隅不敢居於位也行則左右不敢與先生並行也今居位而並行是不止乎童子之所習而自進乎成人之列有躐等之意無自卑之心烏能以求益乎故以為欲速成者而已如物之生循其序而生理達焉若欲速成則反害其生矣故聖門之學先之以灑掃應對進退之事所以長愛敬之端而防敖惰之萌使之循而有進也其可忽諸論語解卷七
