body:
  text: 欽定四庫全書論語解卷十宋張栻撰子張篇子張曰士見危致命見得思義祭思敬喪思哀其可已矣見危則致命見得則思義決擇於義利之際也祭則思敬喪則思哀篤於本也其可已矣者猶云若是可謂士矣楊氏曰於成人曰授命曰見利於士曰致命曰見得蓋致命則力為之不如授命之安見利則未必得也見得而後思義焉則不豫矣此成人與士之異也子張曰執德不𢎞信道不篤焉能為有焉能為亡執德𢎞則進德有地信道篤則志道不回苟其不然雖有為善之心亦若存若亡不能為有亡也程子曰信之不篤則執德無由𢎞子夏之門人問交於子張子張曰子夏云何對曰子夏曰可者與之其不可者拒之子張曰異乎吾所聞君子尊賢而容衆嘉善而矜不能我之大賢與於人何所不容我之不賢與人將拒我如之何其拒人也包注友交當如子夏泛交當如子張其説是蓋交有淺深二子論交各為一義不可廢也若但與之泛然交際而已則固當尊賢而容衆嘉善而矜不能若與之為朋友之交則當與其可者而拒其不可也但拒之之辭微過甚耳然而在學者之分則子張之言未若子夏之嚴也而遽非子夏之説且曰我之大賢與於人何所不容其言若以成德自居者此亦其堂堂氣象也與子夏曰雖小道必有可觀者焉致遠恐泥是以君子不為也堯舜之道天下之達道也非堯舜之道皆小道而已小道亦各有所長非無可觀也然以致逺則必有弊而不可以行致逺謂推之天下與來世也君子之學豈但為目前計哉亦期以逺而已則夫小道者宜君子之不為也然惟其有可觀故可以惑人人惑之謂見其近利云耳若以致逺存心則烏能惑也子夏曰日知其所亡月無忘其所能可謂好學也已矣致其知而不舍故其知日新保其有而不違故其有常存此之謂好學日知其所亡謂日知其所未有也子夏曰博學而篤志切問而近思仁在其中矣博學篤志切問近思不可便以此為仁而仁不外是也惟從事於此而不計其獲則循序而自至蓋不可以欲速而臆度也聖門論仁大抵如此子夏曰百工居肆以成其事君子學以致其道百工居肆所以成其事也君子務學所以致其道也致者極其至也蓋道本不離人然自未合者言之非用力以致之則不能有諸躬耳子夏曰小人之過也必文有過則改之而已小人耻過而憚改故必文文謂飾非以自欺也子夏曰君子有三變望之儼然即之也溫聽其言也厲望之儼然敬而重也即之也溫和而厚也聽其言也厲約而法也夫其望之儼然若不可得而親也及其即之則溫焉即之也溫若可得而親也而聽其言則厲焉其為三變豈君子之強為之哉禮樂無斯須而去身故其成就發見如此子夏曰君子信而後勞其民未信則以為厲己也信而後諫未信則以為謗己也信在使民諫君之先民信則心誠服矣君信則志意交矣然所為信者在乎篤之己者何如耳易曰有孚盈缶夫使民而民以為厲己諫君而君以為謗己是在我孚信未篤而已若舍己而尤人不亦殆乎子夏曰大德不踰間小德出入可也大德大體也小德節目也君子所存大體固有定而至其酬酢之際用權以取中初無一定之執故未嘗不同歸焉如可以取可以無取可以與可以無與之類是也然而斯言以大德不踰間為本必大德不踰間而後小德可以出入蓋其出入未嘗不在其間之中故曰可也不然本之不立而謂出入為可是小人之無忌憚而已子遊曰子夏之門人小子當灑掃應對進退則可矣抑末也本之則無如之何子夏聞之曰噫言遊過矣君子之道孰先傳焉孰後倦焉譬諸草木區以别矣君子之道焉可誣也有始有卒者其惟聖人乎此篇所載子夏之言無非切要而此章尤為能發明聖門之閫奧孰先傳孰後倦謂君子教人具有次序蓋其道本末一致豈有以為先而傳之豈有以為可後而倦不傳但學者資質聞見如草木區分之不同故所得有淺深之異而君子之道本末實一致耳故曰焉可誣也若夫始末兼舉而無餘憾則是聖人矣非學者事也今夫小子習為灑掃應對進退之事是之謂小學由是而致其知則存乎其人是之謂大學至於充之而盡亦初不離乎灑掃應對進退之間若以此為末而别求所謂本則是析本末為二體形而上者與形而下者不相管屬其為弊蓋有不勝言矣以子遊久在聖門而其差猶若此甚矣論學之難也子夏曰仕而優則學學而優則仕大學之道在明明德在親民成己成物之無二致也古之人學以終其身故仕優則學學優則仕其從容暇裕如此終始於學而無窮已也子遊曰喪致乎哀而止喪主於哀致者自盡之謂若毁生滅性則是過乎哀者也子遊曰吾友張也為難能也然而未仁曾子曰堂堂乎張也難與並為仁矣雖有髙明之見卓絶之行謂之難能則可而不害其為未仁也堂堂氣象所以為難與並為仁也歟蓋是道也必深潛縝密親切篤至而後可以進故如愚之顔子聖人許其不違仁而堂堂之張曾子以為難與並為仁也曾子曰吾聞諸夫子人未有自致者也必也親喪乎人於他事未能自盡於親喪其可以不自盡乎若於此不能自盡則何事能盡若於此能自盡則於其他亦推是心而已曾子曰吾聞諸夫子孟莊子之孝也其他可能也其不改父之臣與父之政是難能也以為難能特曰為之不易云耳蓋父之臣與父之政必善矣固當奉而篤之若不幸而有悖於理害於事則當察而更之是乃致其誠愛於親也孟莊子之所以終不改者意者其事雖未為盡善而亦不至於悖理害事之甚與故有取其不忍以改也蓋善而不改乃其常耳不必稱難能惡而不改則是成父之惡不可稱難能也孟氏使陽膚為士師問於曾子曾子曰上失其道民散久矣如得其情則哀矜而勿喜先王之於民所以飬之教之者無所不用其極故民心親附其上服習而不違如是而猶有不率焉而後刑罰加之蓋未嘗不致哀矜惻怛也若夫後世禮義衰微所以飬之教之者皆蕩而不存矣上之人未嘗心乎民也故民心亦渙散而不相屬以陷於罪戾而蹈於刑戮此所謂上失其道民散久矣方是時任士師之職者獄訟之際其可以得情為喜乎蓋當深省所以使民至於此極者以極其哀矜之意焉可也嗟乎後世治獄之官每患不得其情苟得其情則喜矣夫豈知哀矜而勿喜之味哉能存此心則有以仁乎斯民矣子貢曰紂之不善不如是之甚也是以君子惡居下流天下之惡皆歸焉下流如川澤是也川澤處卑衆水畢萃紂之不道可謂極矣其曰不如是之甚者言其始亦未至若是之甚惟其為不善而天下之惡皆將歸之是以若此其極也書稱受為天下逋逃主萃淵藪而飛亷惡來之徒皆集於朝不善之積日纍月成以至於貫盈是豈不猶川澤所居者下而衆水皆歸之者乎故君子惡居下流強為善而已矣子貢曰君子之過也如日月之食焉過也人皆見之更也人皆仰之人皆見之者君子不以文飾掩蔽其過也日月之食旋而復矣無損其明也故君子改過不吝而德愈光焉衛公孫朝問於子貢曰仲尼焉學子貢曰文武之道未墜於地在人賢者識其大者不賢者識其小者莫不有文武之道焉夫子焉不學而亦何常師之有萬理盈於天地間莫非文武之道道初無存亡增損在人所識何如賢者則識其大者不賢者則識其小者人人莫不有文武之道也至如庶民耕田而鑿井仰事而俯育文武之道亦何嘗無乎然則夫子焉往而非學惟善之主而初無常師也此其所以備斯文之大全大舜樂取諸人以為善自耕稼陶漁以至為帝無非取諸人者即此意耳特以文武為言者以文王武王以來其傳至於孔子故也叔孫武叔語大夫於朝曰子貢賢於仲尼子服景伯以告子貢子貢曰譬之宮牆賜之牆也及肩窺見室家之好夫子之牆數仞不得其門而入不見宗廟之美百官之富得其門者或寡矣夫子之云不亦宜乎所造愈深則人愈難識而况於聖人之為至乎非得其門而入者何由知其藴也雖然武叔亦豈真能窺子貢者哉使其果能之則其於夫子之道望乎牆仞當知起尊敬之心求其所以入者而不暇矣叔孫武叔毁仲尼子貢曰無以為也仲尼不可毁也他人之賢者丘陵也猶可踰也仲尼日月也無得而踰焉人雖欲自絶其何傷於日月乎多見其不知量也子貢善喻如宮牆日月之喻皆可謂切矣夫邱陵固可踰太山雖髙然猶有可踰之理至於日月之行天則孰得而踰之哉人之議日月者初何損於日月之明徒為自絶於日月而已矣陳子禽謂子貢曰子為恭也仲尼豈賢於子乎子貢曰君子一言以為知一言以為不知言不可不慎也夫子之不可及也猶天之不可階而升也夫子之得邦家者所謂立之斯立道之斯行綏之斯來動之斯和其生也榮其死也哀如之何其可及也子貢以日月喻聖人之不可踰矣復以天之不可階而升喻聖人之不可及尤為切至矣蓋大而化之非復思勉所及學者至此無所用其力是豈不猶天之不可階而升乎所謂立之斯立道之斯行綏之斯來動之斯和者不疾而速不行而至惟天下至誠感無不通也其生也榮其死也哀無不得其所者也其猶萬物之於天乎子貢知足以知此其所造亦深矣堯曰篇堯曰咨爾舜天之厯數在爾躬允執其中四海困窮天祿永終舜亦以命禹以其德當天心故知天之厯數在其躬允執其中事事物物皆有中天理之所存也惟其心無所倚則能執其中而不失此所謂時中也君之所為安樂者以民故也天之視聽自我民視聽若四海困窮則天祿亦永終矣聖人之相授凡以天人之際而已曰豫小子履敢用玄牡敢昭告于皇皇后帝有罪不敢赦帝臣不蔽簡在帝心朕躬有罪無以萬方萬方有罪罪在朕躬周有大賚善人是富雖有周親不如仁人百姓有過在豫一人程子謂曰字上脫一湯字有罪不敢赦謂桀得罪於天不敢稽天命而不討然凡天下之人莫非帝之臣其善惡不可蔽也則何敢專顧帝所眷命何如爾己有罪則不以及萬方萬方有罪則歸之於己此其自列以聽天命之辭公天下之心如此然則其有天下也亦何與於己哉周有大賚惟善人之是富雖有周至親不如仁賢如周公雖至親亦以尊賢之義為重也百姓有過在豫一人是武王公天下之心與成湯無以異也此所載帝王之事孔子之所常言門人列於末章所以見前聖後聖之心若合符節其不得時位而在下則夫子之道其得時位而在上則帝王之業也謹權量審法度修廢官四方之政行焉興滅國繼絶世舉逸民天下之民歸心焉所重民食喪祭寬則得衆信則民任焉敏則有功公則説權量者法度之所由出也故不可不先謹法度審則綱紀定廢官修則事無曠此政之所以行而無壅也興滅國不欲忘其先之功德也繼絶世不忍墜人之宗祀也舉逸民不使賢才以遐遺也是三者民心之所願而民望之所歸此民之所以歸心也以民食為重則人務本而有以厚其生以喪祭為重則民恤終而有以哀其死凡此皆為政之綱紀也而行之則有本焉下四者是也寬則民有所措故得衆信則民願為之役故民任敏則無失時之患故有功公則順天下之好惡故説然是四者之中公又為本也此亦孔子之所常言帝王為治之要門人并記於此亦春秋示百王大法之意也子張問於孔子曰何如斯可以從政矣子曰尊五美屏四惡斯可以從政矣子張曰何謂五美子曰君子惠而不費勞而不怨欲而不貪泰而不驕威而不猛子張曰何謂惠而不費子曰因民之所利而利之斯不亦惠而不費乎擇可勞而勞之又誰怨欲仁而得仁又焉貪君子無衆寡無小大無敢慢斯不亦泰而不驕乎君子正其衣冠尊其瞻視儼然人望而畏之斯不亦威而不猛乎子張曰何謂四惡子曰不教而殺謂之虐不戒視成謂之暴慢令致期謂之賊猶之與人也出納之吝謂之有司孔子論為政之方莫詳於此故門人復以附前章之後姑息以豫民則惠而費矣若因其所利而利之如制之田里教之樹畜通工易事之類皆是也是則其為惠均平而何費之有使之不以其道則勞而怨矣以逸道使民則何怨之有凡動於己私者皆貪也若所欲者仁而已則何貪之有君子之所以自處者安裕故常泰然而無所不敬也故不驕若夫以勢位智力自恃則驕驕則不泰矣正衣冠尊瞻視臨之以莊也持身如是之嚴故人望而畏之而非以威加人也故威而不猛若夫有使人畏己之心則猛而反害於威矣惠而不費勞而不怨施於人者也欲而不貪泰而不驕威而不猛存於己者也為政內外始終之道亦云備矣然而欲仁又其本歟不教而殺謂未嘗有教以先之及陷於罪然後從而刑之是虐之而已不戒告而視其成是暴之而已令慢而其期則欲必至是賊之而已三者皆不仁者之為也猶之豫人當豫則豫之耳若為政但知守出納之吝而不知施舍之宜是有司之事耳尸其政而但為有司之事豈不失為人上之道乎此不知者之為也失人心而召禍亂未必不由此故亦居四惡之一焉尊五美而屏四惡則政日新而無斁矣五美之後必繼之以四惡之防聖人之戒深矣子曰不知命無以為君子也不知禮無以立也不知言無以知人也此所論命謂窮通得喪之有定也不知命則將徼幸而苟求何以為君子乎知命則志定然後其所當為者可得而為矣禮者所以檢身也不知禮則視聽言動無所持守其將何以立乎知禮則有履踐之實矣知言如吉人之辭寡躁人之辭多之類不知言則無以知其情實之所存其將何以知人乎故知言則取友不差矣此三者學者之所宜先切要之務必以是為本而後學可進不然雖務於窮髙極逺而終無所益門人以此終論語之書豈無旨哉論語解卷十
